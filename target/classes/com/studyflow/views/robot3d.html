<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RLIFE 3D Robot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #canvas-container {
      width: 100%; height: 100%;
      cursor: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 5;
    
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    
    // Mouse tracking
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;
    const windowHalfX = window.innerWidth / 2;
    const windowHalfY = window.innerHeight / 2;
    
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - windowHalfX) / 3;
      mouseY = (e.clientY - windowHalfY) / 3;
    });
    
    // Robot group
    const robot = new THREE.Group();
    
    // Materials
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0x1a1a2e,
      metalness: 0.9,
      roughness: 0.2,
      emissive: 0x0a0a1a,
      emissiveIntensity: 0.5
    });
    
    const accentMaterial = new THREE.MeshStandardMaterial({
      color: 0x8B5CF6,
      metalness: 0.8,
      roughness: 0.3,
      emissive: 0x8B5CF6,
      emissiveIntensity: 0.6
    });
    
    const glowMaterial = new THREE.MeshStandardMaterial({
      color: 0x06B6D4,
      emissive: 0x06B6D4,
      emissiveIntensity: 1,
      metalness: 0.5,
      roughness: 0.2
    });
    
    const eyeMaterial = new THREE.MeshStandardMaterial({
      color: 0x000000,
      emissive: 0x06B6D4,
      emissiveIntensity: 2,
      metalness: 1,
      roughness: 0
    });
    
    // Head
    const headGeom = new THREE.BoxGeometry(1.2, 1, 1);
    const head = new THREE.Mesh(headGeom, bodyMaterial);
    head.position.y = 1.2;
    robot.add(head);
    
    // Visor
    const visorGeom = new THREE.BoxGeometry(1.3, 0.35, 0.1);
    const visor = new THREE.Mesh(visorGeom, accentMaterial);
    visor.position.set(0, 1.35, 0.55);
    robot.add(visor);
    
    // Eyes
    const eyeGeom = new THREE.SphereGeometry(0.08, 16, 16);
    const leftEye = new THREE.Mesh(eyeGeom, eyeMaterial);
    leftEye.position.set(-0.35, 1.35, 0.6);
    robot.add(leftEye);
    
    const rightEye = new THREE.Mesh(eyeGeom, eyeMaterial);
    rightEye.position.set(0.35, 1.35, 0.6);
    robot.add(rightEye);
    
    // Antenna
    const antennaGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8);
    const antenna = new THREE.Mesh(antennaGeom, bodyMaterial);
    antenna.position.set(0, 1.95, 0);
    robot.add(antenna);
    
    const antennaTopGeom = new THREE.SphereGeometry(0.08, 16, 16);
    const antennaTop = new THREE.Mesh(antennaTopGeom, glowMaterial);
    antennaTop.position.set(0, 2.2, 0);
    robot.add(antennaTop);
    
    // Neck
    const neckGeom = new THREE.CylinderGeometry(0.25, 0.3, 0.3, 16);
    const neck = new THREE.Mesh(neckGeom, bodyMaterial);
    neck.position.y = 0.65;
    robot.add(neck);
    
    // Body/Torso
    const torsoGeom = new THREE.CylinderGeometry(0.6, 0.5, 1.2, 8);
    const torso = new THREE.Mesh(torsoGeom, bodyMaterial);
    torso.position.y = 0;
    robot.add(torso);
    
    // Chest panel
    const chestPanelGeom = new THREE.BoxGeometry(0.7, 0.5, 0.1);
    const chestPanel = new THREE.Mesh(chestPanelGeom, accentMaterial);
    chestPanel.position.set(0, 0.1, 0.55);
    robot.add(chestPanel);
    
    // Core glow
    const coreGeom = new THREE.SphereGeometry(0.12, 16, 16);
    const core = new THREE.Mesh(coreGeom, glowMaterial);
    core.position.set(0, 0.1, 0.62);
    robot.add(core);
    
    // Shoulders
    const shoulderGeom = new THREE.SphereGeometry(0.25, 16, 16);
    const leftShoulder = new THREE.Mesh(shoulderGeom, bodyMaterial);
    leftShoulder.position.set(-0.75, 0.3, 0);
    robot.add(leftShoulder);
    
    const rightShoulder = new THREE.Mesh(shoulderGeom, bodyMaterial);
    rightShoulder.position.set(0.75, 0.3, 0);
    robot.add(rightShoulder);
    
    // Arms
    const armGeom = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 8);
    const leftArm = new THREE.Mesh(armGeom, bodyMaterial);
    leftArm.position.set(-0.85, -0.3, 0);
    leftArm.rotation.z = 0.3;
    robot.add(leftArm);
    
    const rightArm = new THREE.Mesh(armGeom, bodyMaterial);
    rightArm.position.set(0.85, -0.3, 0);
    rightArm.rotation.z = -0.3;
    robot.add(rightArm);
    
    // Hands
    const handGeom = new THREE.SphereGeometry(0.12, 16, 16);
    const leftHand = new THREE.Mesh(handGeom, accentMaterial);
    leftHand.position.set(-0.95, -0.7, 0);
    robot.add(leftHand);
    
    const rightHand = new THREE.Mesh(handGeom, accentMaterial);
    rightHand.position.set(0.95, -0.7, 0);
    robot.add(rightHand);
    
    // Hip
    const hipGeom = new THREE.CylinderGeometry(0.5, 0.4, 0.3, 8);
    const hip = new THREE.Mesh(hipGeom, bodyMaterial);
    hip.position.y = -0.75;
    robot.add(hip);
    
    // Legs
    const legGeom = new THREE.CylinderGeometry(0.15, 0.12, 0.9, 8);
    const leftLeg = new THREE.Mesh(legGeom, bodyMaterial);
    leftLeg.position.set(-0.25, -1.4, 0);
    robot.add(leftLeg);
    
    const rightLeg = new THREE.Mesh(legGeom, bodyMaterial);
    rightLeg.position.set(0.25, -1.4, 0);
    robot.add(rightLeg);
    
    // Feet
    const footGeom = new THREE.BoxGeometry(0.25, 0.15, 0.35);
    const leftFoot = new THREE.Mesh(footGeom, bodyMaterial);
    leftFoot.position.set(-0.25, -1.9, 0.05);
    robot.add(leftFoot);
    
    const rightFoot = new THREE.Mesh(footGeom, bodyMaterial);
    rightFoot.position.set(0.25, -1.9, 0.05);
    robot.add(rightFoot);
    
    // Add glowing rings around robot
    const ringGeom = new THREE.TorusGeometry(1.8, 0.02, 16, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0x8B5CF6,
      emissive: 0x8B5CF6,
      emissiveIntensity: 0.8,
      transparent: true,
      opacity: 0.6
    });
    
    const ring1 = new THREE.Mesh(ringGeom, ringMaterial);
    ring1.rotation.x = Math.PI / 2;
    ring1.position.y = 0.5;
    robot.add(ring1);
    
    const ring2 = new THREE.Mesh(ringGeom.clone(), ringMaterial.clone());
    ring2.rotation.x = Math.PI / 2;
    ring2.scale.setScalar(0.7);
    ring2.position.y = -0.5;
    robot.add(ring2);
    
    // Particle system
    const particleCount = 200;
    const particleGeom = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 5;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 5;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 3;
      
      const color = new THREE.Color();
      color.setHSL(Math.random() * 0.2 + 0.7, 1, 0.6);
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }
    
    particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const particleMaterial = new THREE.PointsMaterial({
      size: 0.03,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });
    
    const particles = new THREE.Points(particleGeom, particleMaterial);
    scene.add(particles);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    
    const mainLight = new THREE.DirectionalLight(0xffffff, 1);
    mainLight.position.set(5, 5, 5);
    scene.add(mainLight);
    
    const purpleLight = new THREE.PointLight(0x8B5CF6, 2, 10);
    purpleLight.position.set(-2, 2, 2);
    scene.add(purpleLight);
    
    const cyanLight = new THREE.PointLight(0x06B6D4, 2, 10);
    cyanLight.position.set(2, 1, 3);
    scene.add(cyanLight);
    
    const backLight = new THREE.PointLight(0xEC4899, 1, 8);
    backLight.position.set(0, -2, -3);
    scene.add(backLight);
    
    scene.add(robot);
    
    // Animation
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      
      // Smooth cursor following
      targetX += (mouseX - targetX) * 0.05;
      targetY += (mouseY - targetY) * 0.05;
      
      robot.rotation.y = targetX * 0.3;
      robot.rotation.x = targetY * 0.2;
      
      // Floating animation
      robot.position.y = Math.sin(time * 2) * 0.1;
      
      // Rotate rings
      ring1.rotation.z = time * 0.5;
      ring2.rotation.z = -time * 0.3;
      
      // Pulse core
      const scale = 1 + Math.sin(time * 3) * 0.2;
      core.scale.setScalar(scale);
      
      // Antenna glow pulse
      antennaTop.material.emissiveIntensity = 0.8 + Math.sin(time * 4) * 0.4;
      
      // Eye glow pulse
      eyeMaterial.emissiveIntensity = 1.5 + Math.sin(time * 2) * 0.5;
      
      // Particle animation
      const posArray = particleGeom.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        posArray[i * 3 + 1] += Math.sin(time + i * 0.1) * 0.002;
      }
      particleGeom.attributes.position.needsUpdate = true;
      particles.rotation.y = time * 0.1;
      
      // Arm animation
      leftArm.rotation.z = 0.3 + Math.sin(time * 1.5) * 0.1;
      rightArm.rotation.z = -0.3 + Math.sin(time * 1.5 + 0.5) * 0.1;
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
</html>
