<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0F172A;
  }
  #splineCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  spline-viewer {
    width: 100%;
    height: 100%;
    display: block;
  }
  spline-viewer::part(logo) { display: none; }
</style>
</head>
<body>

<!-- Approach 1: Spline Runtime (canvas-based, more compatible) -->
<canvas id="splineCanvas"></canvas>

<script type="module">
  // Try the Spline Runtime first (canvas-based, better compatibility)
  try {
    import('https://unpkg.com/@splinetool/runtime@1.12.81/build/runtime.js').then(function(module) {
      var Application = module.Application;
      var canvas = document.getElementById('splineCanvas');
      var app = new Application(canvas);
      app.load('https://prod.spline.design/p9rVS8Z0Y3pGIro5/scene.splinecode').then(function() {
        console.log('[Spline] Runtime loaded successfully');
      }).catch(function(err) {
        console.error('[Spline] Runtime load error:', err);
        tryWebComponent();
      });
    }).catch(function(err) {
      console.error('[Spline] Runtime import error:', err);
      tryWebComponent();
    });
  } catch(e) {
    console.error('[Spline] Module error:', e);
    tryWebComponent();
  }

  // Approach 2: Web Component fallback
  function tryWebComponent() {
    document.getElementById('splineCanvas').style.display = 'none';
    var script = document.createElement('script');
    script.type = 'module';
    script.src = 'https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js';
    script.onload = function() {
      var viewer = document.createElement('spline-viewer');
      viewer.setAttribute('url', 'https://prod.spline.design/p9rVS8Z0Y3pGIro5/scene.splinecode');
      viewer.style.cssText = 'width:100%;height:100%;display:block;';
      document.body.appendChild(viewer);
    };
    document.head.appendChild(script);
  }
</script>

</body>
</html>
