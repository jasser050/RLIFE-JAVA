<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PetVerse Garden</title>
<script src="vendor/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1f0d;font-family:'Nunito',sans-serif}

/* ── WORLD CANVAS ── */
#world{position:fixed;inset:0;width:100%;height:100%}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 100%);
}
#logo{
  font-size:1.2rem;font-weight:900;letter-spacing:.05em;
  background:linear-gradient(90deg,#6ee77a,#38d9b0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
#fps{font-size:.65rem;color:rgba(255,255,255,.25);font-family:monospace}

/* Mode toggle */
#mode-btn{
  position:fixed;top:14px;right:14px;z-index:9999;pointer-events:all;cursor:pointer;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(110,231,122,.5);
  border-radius:30px;padding:9px 18px;display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(14px);box-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:all .3s;user-select:none;
}
#mode-btn:hover{background:rgba(30,80,30,.7);border-color:rgba(110,231,122,.9);transform:scale(1.04)}
#mode-btn span{font-size:.82rem;font-weight:800;color:#6ee77a;letter-spacing:.04em}

/* Pet panel */
#pet-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(105%);
  width:min(520px,96vw);z-index:200;pointer-events:all;
  background:linear-gradient(160deg,rgba(8,22,8,.97),rgba(10,28,20,.97));
  border:1px solid rgba(110,231,122,.35);border-bottom:none;
  border-radius:22px 22px 0 0;padding:22px 26px 30px;
  backdrop-filter:blur(24px);
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
#pet-panel.open{transform:translateX(-50%) translateY(0)}
#pp-close{
  position:absolute;top:14px;right:16px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);border-radius:50%;width:28px;height:28px;
  cursor:pointer;color:rgba(255,255,255,.6);font-size:1rem;pointer-events:all;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
#pp-close:hover{background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.4);color:#fff}
#pp-icon{
  width:56px;height:56px;display:block;margin-bottom:12px;
  object-fit:cover;border-radius:50%;
  border:2px solid rgba(110,231,122,.28);
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 8px 20px rgba(0,0,0,.28);
}
#pp-name{font-size:1.5rem;font-weight:900;color:#6ee77a;margin-bottom:3px}
#pp-sub{font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
#pp-desc{font-size:.85rem;color:rgba(255,255,255,.65);line-height:1.65;margin-bottom:14px}
#pp-stats{display:flex;gap:10px;flex-wrap:wrap}
.pp-stat{
  flex:1;min-width:80px;background:rgba(110,231,122,.07);
  border:1px solid rgba(110,231,122,.2);border-radius:12px;
  padding:10px 14px;text-align:center;
}
.sv{font-size:1.1rem;font-weight:900;color:#6ee77a}
.sk{font-size:.62rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* Pet actions (feed/play) */
#pp-actions{display:flex;gap:10px;margin-top:14px}
.pp-act-btn{
  flex:1;padding:10px;border-radius:12px;border:none;cursor:pointer;
  font-size:.85rem;font-weight:800;letter-spacing:.04em;
  transition:all .2s;pointer-events:all;
}
.pp-act-btn.feed{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff}
.pp-act-btn.play{background:linear-gradient(135deg,#1a6b8a,#38d9b0);color:#fff}
.pp-act-btn:hover{transform:scale(1.04);filter:brightness(1.15)}
.pp-act-btn:active{transform:scale(.97)}

/* Controls bar */
#ctrl-bar{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:7px 18px;display:flex;gap:14px;align-items:center;
  backdrop-filter:blur(10px);
}
.kk{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:4px;padding:1px 6px;font-size:.62rem;color:rgba(255,255,255,.75);font-weight:800}
.ct{font-size:.63rem;color:rgba(255,255,255,.4);letter-spacing:.04em}

/* Minimap */
#minimap{
  position:absolute;bottom:56px;right:14px;
  width:94px;height:94px;
  background:rgba(0,0,0,.55);border:1px solid rgba(110,231,122,.3);
  border-radius:12px;overflow:hidden;
}
#mm{width:100%;height:100%}

/* Tooltip */
#tooltip{
  position:fixed;z-index:300;pointer-events:none;
  background:rgba(5,15,5,.92);border:1px solid rgba(110,231,122,.5);
  border-radius:12px;padding:8px 16px;
  backdrop-filter:blur(12px);opacity:0;
  transition:opacity .2s;transform:translate(-50%,-110%);
  white-space:nowrap;
}
#tooltip.show{opacity:1}
#tt-name{font-size:.9rem;font-weight:800;color:#6ee77a}
#tt-type{font-size:.68rem;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}

/* Toast */
#toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(110,231,122,.15);border:1px solid rgba(110,231,122,.4);
  border-radius:30px;padding:8px 22px;
  font-size:.82rem;font-weight:700;color:#6ee77a;letter-spacing:.04em;
  pointer-events:none;z-index:500;opacity:0;
  transition:all .3s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Zone label */
#zone-lbl{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:6px 18px;
  font-size:.78rem;font-weight:700;color:#6ee77a;letter-spacing:.06em;
  opacity:0;transition:opacity .3s;backdrop-filter:blur(10px);pointer-events:none;
}
#zone-lbl.show{opacity:1}
</style>
</head>
<body>

<canvas id="world"></canvas>

<!-- Mode toggle -->
<div id="mode-btn" onclick="toggleNight()">
  <span id="mode-icon">🌙</span>
  <span id="mode-label">Night Mode</span>
</div>

<!-- Tooltip -->
<div id="tooltip"><div id="tt-name"></div><div id="tt-type"></div></div>

<!-- Pet panel -->
<div id="pet-panel">
  <button id="pp-close" onclick="closePanel()">✕</button>
  <img id="pp-icon" src="../assets/pets/cat-avatar.jpg" alt="Cat">
  <div id="pp-name">Cat</div>
  <div id="pp-sub">Common</div>
  <div id="pp-desc">—</div>
  <div id="pp-stats">
    <div class="pp-stat"><div class="sv" id="pp-lv">1</div><div class="sk">Level</div></div>
    <div class="pp-stat"><div class="sv" id="pp-pw">0</div><div class="sk">Power</div></div>
    <div class="pp-stat"><div class="sv" id="pp-sp">0</div><div class="sk">Speed</div></div>
    <div class="pp-stat"><div class="sv" id="pp-ch">0</div><div class="sk">Charm</div></div>
  </div>
  <div id="pp-actions">
    <button class="pp-act-btn feed" onclick="feedPet()">🍖 Feed</button>
    <button class="pp-act-btn play" onclick="playWithPet()">🎾 Play</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <div id="logo">🌿 PetVerse Garden</div>
    <div id="fps"></div>
  </div>
  <div id="zone-lbl"></div>
  <div id="ctrl-bar">
    <span class="ct"><span class="kk">WASD</span> Pan</span>
    <span class="ct"><span class="kk">Scroll</span> Zoom</span>
    <span class="ct"><span class="kk">Drag</span> Pan</span>
    <span class="ct"><span class="kk">T</span> Day/Night</span>
    <span class="ct"><span class="kk">Click Pet</span> Info</span>
  </div>
  <div id="minimap"><canvas id="mm" width="94" height="94"></canvas></div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// PET DATA
// ══════════════════════════════════════════════════
var PETS = {
  cat:     {name:'Cat',     icon:'🐱', rarity:'Common',    color:'#dd8844', glow:'rgba(221,136,68,',  desc:'Playful companion. A graceful tabby who loves sunbathing and chasing butterflies.',   lvl:12, pow:45, spd:72, charm:88, fly:false},
  dog:     {name:'Dog',     icon:'🐶', rarity:'Common',    color:'#c8964a', glow:'rgba(200,150,74,',  desc:'Loyal companion. Always ready to fetch sticks and splash around in the garden pond.',  lvl:10, pow:60, spd:68, charm:95, fly:false},
  dragon:  {name:'Dragon',  icon:'🐲', rarity:'Legendary', color:'#44cc55', glow:'rgba(68,204,85,',  desc:'Bold companion. An ancient dragon that soars above the garden breathing green fire.',   lvl:50, pow:99, spd:85, charm:70, fly:true },
  fox:     {name:'Fox',     icon:'🦊', rarity:'Rare',      color:'#ee7733', glow:'rgba(238,119,51,',  desc:'Curious companion. A cunning fox that dashes through the undergrowth at full speed.',  lvl:22, pow:72, spd:95, charm:76, fly:false},
  bird:    {name:'Bird',    icon:'🦅', rarity:'Uncommon',  color:'#bb9944', glow:'rgba(187,153,68,',  desc:'Energetic companion. A majestic bird that soars high and dives with breathtaking speed.',lvl:18, pow:55, spd:90, charm:80, fly:true },
  hamster: {name:'Hamster', icon:'🐹', rarity:'Common',    color:'#ddaa66', glow:'rgba(221,170,102,', desc:'Cozy companion. A chubby hamster that stuffs its cheeks and loves to wheel around.',   lvl:8,  pow:22, spd:55, charm:99, fly:false},
  panda:   {name:'Panda',   icon:'🐼', rarity:'Rare',      color:'#aabbcc', glow:'rgba(170,187,204,', desc:'Calm companion. A serene panda that munches bamboo and naps under the trees.',         lvl:25, pow:65, spd:45, charm:97, fly:false},
  rabbit:  {name:'Rabbit',  icon:'🐰', rarity:'Common',    color:'#ddccee', glow:'rgba(221,204,238,', desc:'Gentle companion. A fluffy rabbit that hops between flowers and loves crunchy carrots.',lvl:9,  pow:28, spd:88, charm:98, fly:false},
};

var THREE_AVAILABLE = typeof THREE !== 'undefined';

if (typeof CanvasRenderingContext2D !== 'undefined' &&
    CanvasRenderingContext2D.prototype &&
    !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
    var r = typeof radius === 'number' ? {tl: radius, tr: radius, br: radius, bl: radius} : radius;
    this.moveTo(x + r.tl, y);
    this.lineTo(x + width - r.tr, y);
    this.quadraticCurveTo(x + width, y, x + width, y + r.tr);
    this.lineTo(x + width, y + height - r.br);
    this.quadraticCurveTo(x + width, y + height, x + width - r.br, y + height);
    this.lineTo(x + r.bl, y + height);
    this.quadraticCurveTo(x, y + height, x, y + height - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    return this;
  };
}

function parsePetEntries() {
  try {
    var raw = new URLSearchParams(window.location.search).get('pets');
    if (!raw) return [];
    var data = JSON.parse(raw);
    if (!Array.isArray(data)) return [];
    return data
      .map(function(entry) {
        if (!entry || !entry.type) return null;
        var type = String(entry.type).toLowerCase();
        var base = PETS[type];
        if (!base) return null;
        return {
          type: type,
          name: entry.name || base.name,
          owner: entry.owner || 'You',
          rarity: entry.rarity || base.rarity,
          mood: entry.mood || 'calm',
          lvl: Number.isFinite(Number(entry.level)) ? Number(entry.level) : base.lvl,
          pow: base.pow,
          spd: base.spd,
          charm: base.charm,
          icon: base.icon,
          color: base.color,
          glow: base.glow,
          desc: base.desc,
          fly: base.fly
        };
      })
      .filter(Boolean);
  } catch (e) {
    return [];
  }
}

function getPetPortraitUrl(type) {
  var normalized = String(type || 'cat').toLowerCase();
  return '../assets/pets/' + normalized + '-avatar.jpg';
}

// ══════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════
var canvas = document.getElementById('world');
var ctx = canvas.getContext('2d');
var W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════
// WORLD STATE
// ══════════════════════════════════════════════════
var cam = {x:0, y:0, zoom:1};
var isNight = false;

// World units: garden is ~600×600, centered at 0,0
var GARDEN = 280; // half-size

// Zones
var ZONES = [
  {name:'🌸 Blossom Meadow', x:-120, y:-120, r:100},
  {name:'💧 Crystal Pond',   x: 100, y:  80, r: 70},
  {name:'🌲 Ancient Grove',  x:-160, y: 120, r: 80},
  {name:'🔥 Dragon Perch',   x: 130, y:-130, r: 80},
];

// Trees (static decorations)
var TREES = [];
var FLOWERS = [];
var MUSHROOMS = [];
var ROCKS = [];

function initDecorations() {
  var rng = seeded(42);
  // Trees
  for (var i = 0; i < 28; i++) {
    TREES.push({
      x: (rng()-0.5)*500, y: (rng()-0.5)*500,
      s: 18+rng()*22,
      col: rng() > 0.5 ? '#2d6a4f' : '#1b4332',
      trunk: rng() > 0.3 ? '#6b3a2a' : '#8b5e3c',
    });
  }
  // Flowers
  for (var i = 0; i < 45; i++) {
    var colors = ['#ff6b9d','#ffcc44','#ff9955','#cc88ff','#55ccff','#ff5577'];
    FLOWERS.push({
      x: (rng()-0.5)*480, y: (rng()-0.5)*480,
      col: colors[Math.floor(rng()*colors.length)],
      s: 5+rng()*7,
    });
  }
  // Mushrooms
  for (var i = 0; i < 12; i++) {
    MUSHROOMS.push({x:(rng()-0.5)*400,y:(rng()-0.5)*400,s:8+rng()*10,
      col:rng()>.5?'#cc3322':'#993322'});
  }
  // Rocks
  for (var i = 0; i < 15; i++) {
    ROCKS.push({x:(rng()-0.5)*440,y:(rng()-0.5)*440,s:10+rng()*16,col:'#666677'});
  }
}

function seeded(s) {
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return ((s >>> 0) / 4294967296);
  };
}

// ══════════════════════════════════════════════════
// PET INSTANCES
// ══════════════════════════════════════════════════
var petInsts = [];

function initPets() {
  var entries = parsePetEntries();
  if (!entries.length) {
    entries = Object.keys(PETS).map(function(type) {
      var base = PETS[type];
      return {
        type: type,
        name: base.name,
        owner: 'System',
        rarity: base.rarity,
        mood: 'calm',
        lvl: base.lvl,
        pow: base.pow,
        spd: base.spd,
        charm: base.charm,
        icon: base.icon,
        color: base.color,
        glow: base.glow,
        desc: base.desc,
        fly: base.fly
      };
    });
  }
  var rng = seeded(7);
  entries.forEach(function(entry, i) {
    var angle = (i / entries.length) * Math.PI * 2;
    var dist = 80 + rng() * 120;
    petInsts.push({
      id: entry.type,
      pet: entry,
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist,
      vx: (rng()-.5) * .5,
      vy: (rng()-.5) * .5,
      wanderAngle: rng() * Math.PI * 2,
      wanderTimer: rng() * 3,
      bobPhase: rng() * Math.PI * 2,
      flyOffset: rng() * Math.PI * 2,
      scale: 1,
      hovered: false,
      feedAnim: 0,
      playAnim: 0,
      sparkles: [],
      emojiBurst: null,
    });
  });
}

// ══════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════
var keys = {};
var drag = {active:false, sx:0, sy:0, cx:0, cy:0};
var mouse = {wx:0, wy:0};
var hoveredPet = null;
var selectedPet = null;
var panelOpen = false;

window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (e.code === 'KeyT') toggleNight();
  if (e.code === 'Escape') closePanel();
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

canvas.addEventListener('mousedown', function(e) {
  drag.active = true;
  drag.sx = e.clientX; drag.sy = e.clientY;
  drag.cx = cam.x; drag.cy = cam.y;
});
canvas.addEventListener('mousemove', function(e) {
  if (drag.active) {
    cam.x = drag.cx + (e.clientX - drag.sx) / cam.zoom;
    cam.y = drag.cy + (e.clientY - drag.sy) / cam.zoom;
  }
  // World coords
  mouse.wx = (e.clientX - W/2) / cam.zoom - cam.x;
  mouse.wy = (e.clientY - H/2) / cam.zoom - cam.y;
  // Hover detection
  checkHover();
});
canvas.addEventListener('mouseup', function(e) {
  var moved = Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy);
  drag.active = false;
  if (moved < 6) handleClick();
});
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var dz = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(0.35, Math.min(3.5, cam.zoom * dz));
}, {passive:false});

// Touch
var touch0 = null;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    drag.active = true;
    drag.sx = e.touches[0].clientX; drag.sy = e.touches[0].clientY;
    drag.cx = cam.x; drag.cy = cam.y;
    touch0 = null;
  } else if (e.touches.length === 2) {
    drag.active = false;
    touch0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && drag.active) {
    cam.x = drag.cx + (e.touches[0].clientX - drag.sx) / cam.zoom;
    cam.y = drag.cy + (e.touches[0].clientY - drag.sy) / cam.zoom;
    mouse.wx = (e.touches[0].clientX - W/2) / cam.zoom - cam.x;
    mouse.wy = (e.touches[0].clientY - H/2) / cam.zoom - cam.y;
    checkHover();
  } else if (e.touches.length === 2 && touch0 !== null) {
    var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    cam.zoom = Math.max(0.35, Math.min(3.5, cam.zoom * (d/touch0)));
    touch0 = d;
  }
},{passive:false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (drag.active && e.changedTouches.length) {
    var dx = e.changedTouches[0].clientX - drag.sx, dy = e.changedTouches[0].clientY - drag.sy;
    if (Math.abs(dx)+Math.abs(dy) < 8) handleClick();
  }
  drag.active = false; touch0 = null;
},{passive:false});

function checkHover() {
  hoveredPet = null;
  for (var i = petInsts.length-1; i >= 0; i--) {
    var p = petInsts[i];
    var d = Math.hypot(mouse.wx - p.x, mouse.wy - p.y);
    if (d < 30) { hoveredPet = p; break; }
  }
  // Tooltip
  var tt = document.getElementById('tooltip');
  if (hoveredPet) {
    var pd = hoveredPet.pet || PETS[hoveredPet.id];
    document.getElementById('tt-name').textContent = pd.name;
    document.getElementById('tt-type').textContent = pd.rarity;
    // Convert to screen
    var sx = (hoveredPet.x + cam.x) * cam.zoom + W/2;
    var sy = (hoveredPet.y + cam.y) * cam.zoom + H/2;
    tt.style.left = sx + 'px';
    tt.style.top  = (sy - 10) + 'px';
    tt.classList.add('show');
    canvas.style.cursor = 'pointer';
  } else {
    tt.classList.remove('show');
    canvas.style.cursor = drag.active ? 'grabbing' : 'grab';
  }
}

function handleClick() {
  if (hoveredPet) {
    selectedPet = hoveredPet;
    openPanel(hoveredPet.pet || PETS[hoveredPet.id]);
  } else {
    closePanel();
  }
}

function openPanel(pd) {
  var icon = document.getElementById('pp-icon');
  var panelType = pd.type || (selectedPet && selectedPet.id) || 'cat';
  icon.src = getPetPortraitUrl(panelType);
  icon.alt = pd.name || 'Pet';
  document.getElementById('pp-name').textContent = pd.name;
  document.getElementById('pp-sub').textContent  = pd.rarity + ' Pet';
  document.getElementById('pp-desc').textContent = pd.desc;
  document.getElementById('pp-lv').textContent   = pd.lvl;
  document.getElementById('pp-pw').textContent   = pd.pow;
  document.getElementById('pp-sp').textContent   = pd.spd;
  document.getElementById('pp-ch').textContent   = pd.charm;
  document.getElementById('pet-panel').classList.add('open');
  panelOpen = true;
}

function closePanel() {
  document.getElementById('pet-panel').classList.remove('open');
  panelOpen = false;
  selectedPet = null;
}

function feedPet() {
  if (!selectedPet) return;
  selectedPet.feedAnim = 1;
  spawnSparkles(selectedPet, '🍖', '#ffaa44');
  showToast('🍖 ' + (selectedPet.pet ? selectedPet.pet.name : PETS[selectedPet.id].name) + ' loved the food! +20 happiness');
}

function playWithPet() {
  if (!selectedPet) return;
  selectedPet.playAnim = 1;
  spawnSparkles(selectedPet, '🎾', '#38d9b0');
  showToast('🎾 Playing with ' + (selectedPet.pet ? selectedPet.pet.name : PETS[selectedPet.id].name) + '! +15 energy');
}

function spawnSparkles(pet, emoji, col) {
  for (var i = 0; i < 8; i++) {
    pet.sparkles.push({
      x: pet.x, y: pet.y,
      vx: (Math.random()-.5)*4,
      vy: -2-Math.random()*3,
      life: 1.0,
      col: col,
      emoji: i < 3 ? emoji : null,
      size: 8+Math.random()*8,
    });
  }
}

var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){t.classList.remove('show');},3000);
}

// Night toggle
function toggleNight() {
  isNight = !isNight;
  document.getElementById('mode-icon').textContent  = isNight ? '☀️' : '🌙';
  document.getElementById('mode-label').textContent = isNight ? 'Day Mode' : 'Night Mode';
  showToast(isNight ? '🌙 Night has fallen over the garden…' : '☀️ Good morning, PetVerse!');

// DRAW
// ══════════════════════════════════════════════════
var t = 0, dt = 0, last = performance.now();
var fc = 0, ft = 0;
var stars = [];

function initStars() {
  for (var i = 0; i < 200; i++) {
    stars.push({x:Math.random()*W, y:Math.random()*(H*0.6), s:0.5+Math.random()*1.5, tw:Math.random()*Math.PI*2});
  }
}
initStars();

function drawBackground() {
  var sky1, sky2, ground1, ground2;
  if (isNight) {
    sky1 = '#030d03'; sky2 = '#0a1a12';
    ground1 = '#0d1f0d'; ground2 = '#081508';
  } else {
    sky1 = '#7edcff'; sky2 = '#3ab7e0';
    ground1 = '#1a4d1a'; ground2 = '#143d14';
  }
  // Sky gradient
  var sg = ctx.createLinearGradient(0,0,0,H*0.55);
  sg.addColorStop(0, sky1); sg.addColorStop(1, sky2);
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,H*0.55);

  // Ground gradient
  var gg = ctx.createLinearGradient(0,H*0.5,0,H);
  gg.addColorStop(0, ground1); gg.addColorStop(1, ground2);
  ctx.fillStyle = gg; ctx.fillRect(0,H*0.5,W,H*0.5);

  // Horizon blend
  var hg = ctx.createLinearGradient(0,H*0.47,0,H*0.58);
  hg.addColorStop(0,'transparent');
  hg.addColorStop(1, isNight ? 'rgba(8,21,8,.9)' : 'rgba(20,60,20,.7)');
  ctx.fillStyle = hg; ctx.fillRect(0,H*0.47,W,H*0.12);

  // Stars (night)
  if (isNight) {
    stars.forEach(function(s) {
      var a = 0.4+0.6*Math.abs(Math.sin(s.tw + t*0.8));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,220,'+a+')';
      ctx.fill();
    });
    // Moon
    ctx.save();
    ctx.shadowBlur = 30; ctx.shadowColor = '#aaddff';
    ctx.beginPath(); ctx.arc(W*0.78, H*0.18, 30, 0, Math.PI*2);
    ctx.fillStyle = '#ddeeff'; ctx.fill();
    ctx.restore();
    // Dim crescent
    ctx.beginPath(); ctx.arc(W*0.78+10, H*0.18-5, 26, 0, Math.PI*2);
    ctx.fillStyle = sky1; ctx.fill();
  } else {
    // Sun
    ctx.save();
    ctx.shadowBlur = 50; ctx.shadowColor = '#ffee88';
    ctx.beginPath(); ctx.arc(W*0.78, H*0.15, 36, 0, Math.PI*2);
    ctx.fillStyle = '#ffdd44'; ctx.fill();
    ctx.restore();
    // Clouds
    drawCloud(W*0.2, H*0.1, 0.9+0.05*Math.sin(t*0.3));
    drawCloud(W*0.55, H*0.08, 1.1+0.05*Math.sin(t*0.25+1));
    drawCloud(W*0.1, H*0.22, 0.7+0.05*Math.sin(t*0.35+2));
  }
}

function drawCloud(cx, cy, sc) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  function blob(x,y,r){ctx.beginPath();ctx.arc(cx+x*sc,cy+y*sc,r*sc,0,Math.PI*2);ctx.fill();}
  blob(0,0,22); blob(28,4,17); blob(-28,4,17); blob(14,-10,14); blob(-14,-10,14);
  ctx.restore();
}

// World-space drawing helpers
function w2s(wx, wy) {
  return {
    x: (wx + cam.x) * cam.zoom + W/2,
    y: (wy + cam.y) * cam.zoom + H/2,
  };
}

function drawWorld() {
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(cam.x, cam.y);

  // Garden boundary glow
  ctx.save();
  ctx.shadowBlur = 30;
  ctx.shadowColor = isNight ? 'rgba(110,231,122,.25)' : 'rgba(110,231,122,.12)';
  ctx.strokeStyle = isNight ? 'rgba(110,231,122,.35)' : 'rgba(110,231,122,.2)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(-GARDEN, -GARDEN, GARDEN*2, GARDEN*2, 30);
  ctx.stroke();
  ctx.restore();

  // Ground fill
  var gf = ctx.createRadialGradient(0,0,30,0,0,GARDEN*1.2);
  if (isNight) {
    gf.addColorStop(0,'rgba(20,50,20,.6)');
    gf.addColorStop(1,'rgba(8,20,8,.2)');
  } else {
    gf.addColorStop(0,'rgba(40,100,40,.5)');
    gf.addColorStop(1,'rgba(20,60,20,.2)');
  }
  ctx.fillStyle = gf;
  ctx.beginPath(); ctx.roundRect(-GARDEN,-GARDEN,GARDEN*2,GARDEN*2,30); ctx.fill();

  // Rocks
  ROCKS.forEach(function(r) {
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.s*1.3, r.s*0.7, 0, 0, Math.PI*2);
    ctx.fillStyle = isNight ? '#44445a' : '#888899';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r.x-r.s*.2, r.y-r.s*.1, r.s*.4, r.s*.3, -0.3, 0, Math.PI*2);
    ctx.fillStyle = isNight ? '#55556a' : '#aaaacc';
    ctx.fill();
  });

  // Pond
  drawPond();

  // Flowers
  FLOWERS.forEach(function(f) {
    var bob = Math.sin(t*1.5 + f.x) * 1.5;
    drawFlower(f.x, f.y + bob, f.col, f.s);
  });

  // Mushrooms
  MUSHROOMS.forEach(function(m) {
    drawMushroom(m.x, m.y, m.col, m.s);
  });

  // Trees
  TREES.forEach(function(tr) {
    drawTree(tr.x, tr.y, tr.s, tr.col, tr.trunk);
  });

  // Zone markers (subtle)
  ZONES.forEach(function(z) {
    ctx.beginPath();
    ctx.arc(z.x, z.y, z.r, 0, Math.PI*2);
    ctx.strokeStyle = isNight ? 'rgba(110,231,122,.12)' : 'rgba(110,231,122,.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6,10]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Pets (sorted by y for pseudo-depth)
  var sorted = petInsts.slice().sort(function(a,b){return a.y-b.y;});
  sorted.forEach(function(p) { drawPet(p); });

  // Sparkles (above pets)
  sorted.forEach(function(p) { drawSparkles(p); });

  ctx.restore();
}

function drawPond() {
  var shimmer = 0.25 + 0.12*Math.sin(t*1.2);
  ctx.save();
  ctx.shadowBlur = isNight ? 25 : 12;
  ctx.shadowColor = isNight ? 'rgba(26,104,200,.6)' : 'rgba(26,104,200,.35)';
  // Main pond
  ctx.beginPath();
  ctx.ellipse(100, 75, 80, 52, 0.15, 0, Math.PI*2);
  var pg = ctx.createRadialGradient(100,75,5,100,75,80);
  pg.addColorStop(0, isNight ? 'rgba(10,40,100,.85)' : 'rgba(30,90,180,.8)');
  pg.addColorStop(1, isNight ? 'rgba(5,20,60,.7)'  : 'rgba(20,70,150,.6)');
  ctx.fillStyle = pg; ctx.fill();
  // Shimmer lines
  for (var i = 0; i < 4; i++) {
    var sx = 70+i*20+Math.sin(t+i)*8, sy = 65+Math.cos(t*.8+i)*6;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+15+i*5,sy+2);
    ctx.strokeStyle = 'rgba(180,220,255,'+shimmer+')'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
  // Lily pads
  [[85,90],[115,68],[98,80]].forEach(function(pos,i) {
    ctx.beginPath();
    ctx.ellipse(pos[0],pos[1],8,5,i*0.8,0,Math.PI*2);
    ctx.fillStyle = 'rgba(30,140,60,.85)'; ctx.fill();
    if(i===0){ctx.beginPath();ctx.arc(pos[0]+2,pos[1]-3,3,0,Math.PI*2);ctx.fillStyle='rgba(255,100,180,.9)';ctx.fill();}
  });
}

function drawFlower(x,y,col,s) {
  // Stem
  ctx.strokeStyle = '#2d8a4f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x,y+s); ctx.lineTo(x,y+s*2.5); ctx.stroke();
  // Petals
  for(var i=0;i<5;i++){
    var a = (i/5)*Math.PI*2;
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*s*.7, y+Math.sin(a)*s*.7, s*.55, s*.35, a, 0, Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
  }
  // Center
  ctx.beginPath(); ctx.arc(x,y,s*.35,0,Math.PI*2);
  ctx.fillStyle='#ffee44'; ctx.fill();
}

function drawMushroom(x,y,col,s) {
  // Stem
  ctx.beginPath();
  ctx.ellipse(x,y+s*.7, s*.3, s*.5, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(240,220,200,.8)'; ctx.fill();
  // Cap
  ctx.beginPath();
  ctx.ellipse(x, y, s*.9, s*.7, 0, Math.PI, Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  // Spots
  [[-.3,-.2,.15],[.2,-.3,.12],[0,-.1,.1]].forEach(function(sp) {
    ctx.beginPath(); ctx.arc(x+sp[0]*s,y+sp[1]*s,sp[2]*s,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill();
  });
}

function drawTree(x,y,s,leafCol,trunkCol) {
  // Shadow
  ctx.beginPath();
  ctx.ellipse(x, y+s*.3, s*0.9, s*0.2, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fill();
  // Trunk
  ctx.beginPath();
  ctx.rect(x-s*.12, y-s*.1, s*.24, s*.9);
  ctx.fillStyle=trunkCol; ctx.fill();
  // Foliage layers
  [[0,-s*.2,s],[0,-s*.9,s*.8],[0,-s*1.5,s*.55]].forEach(function(layer,i) {
    ctx.beginPath();
    ctx.arc(x+layer[0], y+layer[1], layer[2], 0, Math.PI*2);
    ctx.fillStyle = isNight ? shiftDark(leafCol) : leafCol;
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(x+layer[0]-layer[2]*.25, y+layer[1]-layer[2]*.2, layer[2]*.35, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fill();
  });
}

function shiftDark(col) {
  return col === '#2d6a4f' ? '#1a3d2e' : '#132b1f';
}

var PET3D = {};

// Offscreen canvas size for each pet
var PET_SIZE = 128;

function hex2rgb(hex) {
  var r = parseInt(hex.slice(1,3),16)/255;
  var g = parseInt(hex.slice(3,5),16)/255;
  var b = parseInt(hex.slice(5,7),16)/255;
  return {r:r,g:g,b:b};
}

function makeMat(hexColor, rough, metal) {
  var c = hex2rgb(hexColor);
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(c.r,c.g,c.b),
    roughness: rough !== undefined ? rough : 0.55,
    metalness: metal !== undefined ? metal : 0.0,
  });
}

  var sun = new THREE.DirectionalLight(0xfff5e0, 1.4);

  sun.castShadow = true;
  scene.add(sun);

// Initialize 3D pet renderers
var pet3DScenes = {};
function init3DPets() {
  if (!THREE_AVAILABLE) return;
  Object.keys(PETS).forEach(function(id) {
    try {
      pet3DScenes[id] = buildPetScene(id);
    } catch (e) {
      THREE_AVAILABLE = false;
      pet3DScenes = {};
      return;
    }
  });
}

// Render a 3D pet to its offscreen canvas, return the canvas
function render3DPet(petId, time, hovering, isSelected, isFlying, flyOffset, bobPhase) {
  if (!THREE_AVAILABLE) return null;
  var sc = pet3DScenes[petId];
  if (!sc) return null;

  var g = sc.group;
  // Bob / fly animation
  var flyY = isFlying ? Math.sin(time*1.5 + flyOffset) * 0.12 : 0;
  var bob = Math.abs(Math.sin(time*3 + bobPhase)) * 0.04;
  g.position.y = -0.35 + flyY + bob;

  // Gentle idle sway
  g.rotation.y = Math.sin(time*0.8 + bobPhase) * 0.12;
  g.rotation.z = Math.sin(time*0.5 + bobPhase*0.7) * 0.04;

  // Hover scale
  var hoverScale = hovering ? 1.15 : 1.0;
  var breathe = 1 + 0.015*Math.sin(time*2 + bobPhase);
  var finalScale = hoverScale * breathe;
  g.scale.setScalar(finalScale);

  // Special: dog tail wag
  if (petId === 'dog') {
    var tailMesh = g.getObjectByName('tail');
    if (tailMesh) tailMesh.rotation.y = Math.sin(time*5) * 0.5;
  }

  // Update lighting for night mode
  var amb = sc.scene.children.find(function(c){return c.isAmbientLight;});
  var sun = sc.scene.children.find(function(c){return c.isDirectionalLight;});
  if (amb) amb.intensity = isNight ? 0.2 : 0.45;
  if (sun) { sun.intensity = isNight ? 0.6 : 1.4; sun.color.set(isNight ? 0x6688cc : 0xfff5e0); }

  // Selected glow via emissive boost
  g.traverse(function(child){
    if (child.isMesh && child.material && !child.material.emissive) return;
    if (child.isMesh && child.material && child.material.emissive) {
      if (isSelected) {
        child.material.emissiveIntensity = (child.material.emissiveIntensity || 0) > 0
          ? child.material.emissiveIntensity
          : 0.12;
      }
    }
  });

  sc.renderer.render(sc.scene, sc.camera);
  return sc.renderer.domElement;
}

function drawPet(p) {
  var pd = p.pet || PETS[p.id];
  var fy = pd.fly ? Math.sin(t*1.5 + p.flyOffset) * 12 : 0;
  var bob = Math.abs(Math.sin(t*3 + p.bobPhase)) * 3;
  var px = p.x, py = p.y + fy - bob;
  var sc = (p.id === (hoveredPet&&hoveredPet.id) ? 1.15 : 1.0)
         * (1 + 0.04*Math.sin(t*2+p.bobPhase));
  var isSelected = selectedPet && selectedPet.id === p.id;
  var isHovered = hoveredPet && hoveredPet.id === p.id;

  // Shadow (ground shadow under pet)
  ctx.beginPath();
  ctx.ellipse(px, p.y + 20, 20*sc, 7*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,'+(0.32-Math.abs(fy)*0.005)+')';
  ctx.fill();

  // Glow ring (selected or legendary)
  if (isSelected || pd.rarity === 'Legendary') {
    ctx.save();
    ctx.shadowBlur = 22+10*Math.sin(t*2);
    ctx.shadowColor = pd.color;
    ctx.beginPath();
    ctx.arc(px, py, 34*sc, 0, Math.PI*2);
    ctx.strokeStyle = pd.glow + (isSelected ? '0.7)' : '0.35)');
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();
  }

  // Platform glow
  ctx.beginPath();
  ctx.ellipse(px, p.y+20, 24*sc, 9*sc, 0, 0, Math.PI*2);
  var rg = ctx.createRadialGradient(px,p.y+20,0,px,p.y+20,24*sc);
  rg.addColorStop(0, pd.glow+'0.35)');
  rg.addColorStop(1, pd.glow+'0)');
  ctx.fillStyle = rg; ctx.fill();

  // Draw 3D pet
  var petCanvas = render3DPet(
    p.id, t,
    isHovered, isSelected,
    pd.fly, p.flyOffset, p.bobPhase
  );
  if (petCanvas) {
    var drawSize = 68 * sc;
    ctx.drawImage(petCanvas, px - drawSize/2, py - drawSize*0.88, drawSize, drawSize);
  } else {
    ctx.save();
    ctx.translate(px, py);
    ctx.scale(sc, sc);
    ctx.font = '30px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pd.icon, 0, 0);
    ctx.restore();
  }

  // Name label
  if (cam.zoom > 0.55) {
    ctx.save();
    ctx.fillStyle = 'rgba(5,15,5,.75)';
    var lw = ctx.measureText(pd.name).width + 16;
    ctx.beginPath();
    ctx.roundRect(px - lw/2, py - 46*sc, lw, 18, 6);
    ctx.fill();
    ctx.font = '500 10px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = pd.color;
    ctx.fillText(pd.name, px, py - 37*sc);
    ctx.restore();
  }

  // Feed/play bounce animation
  if (p.feedAnim > 0) {
    var fa = p.feedAnim;
    ctx.save();
    ctx.globalAlpha = fa;
    ctx.font = (18+fa*8)+'px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🍖', px, py - 55 - (1-fa)*30);
    ctx.restore();
  }
}

function drawSparkles(p) {
  p.sparkles.forEach(function(sp) {
    ctx.save();
    ctx.globalAlpha = sp.life;
    if (sp.emoji) {
      ctx.font = sp.size+'px serif';
      ctx.textAlign = 'center';
      ctx.fillText(sp.emoji, sp.x, sp.y);
    } else {
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sp.size*0.35, 0, Math.PI*2);
      ctx.fillStyle = sp.col;
      ctx.shadowBlur = 6; ctx.shadowColor = sp.col;
      ctx.fill();
    }
    ctx.restore();
  });
}

// ── MINIMAP ──
var mmCtx = document.getElementById('mm').getContext('2d');
function drawMinimap() {
  var MC = 94, S = 0.155;
  mmCtx.clearRect(0,0,MC,MC);
  mmCtx.fillStyle = isNight ? 'rgba(3,10,3,.9)' : 'rgba(15,40,15,.85)';
  mmCtx.fillRect(0,0,MC,MC);
  // Garden rect
  mmCtx.strokeStyle='rgba(110,231,122,.4)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(MC/2-GARDEN*S, MC/2-GARDEN*S, GARDEN*2*S, GARDEN*2*S);
  // Pond
  mmCtx.beginPath(); mmCtx.ellipse(MC/2+100*S, MC/2+75*S, 80*S, 52*S, 0.15, 0, Math.PI*2);
  mmCtx.fillStyle='rgba(26,104,180,.7)'; mmCtx.fill();
  // Pets
  petInsts.forEach(function(p) {
    var pd = PETS[p.id];
    mmCtx.beginPath(); mmCtx.arc(MC/2+p.x*S, MC/2+p.y*S, 3, 0, Math.PI*2);
    mmCtx.fillStyle = pd.color; mmCtx.fill();
  });
  // Camera view indicator
  var vw = (W/cam.zoom)*S*.5, vh = (H/cam.zoom)*S*.5;
  mmCtx.strokeStyle='rgba(255,255,255,.5)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(MC/2 - cam.x*S - vw/2, MC/2 - cam.y*S - vh/2, vw, vh);
}

// ── ZONE LABEL ──
var lastZone = '';
function checkZone() {
  var inZone = '';
  ZONES.forEach(function(z) {
    if (Math.hypot(mouse.wx - z.x, mouse.wy - z.y) < z.r) inZone = z.name;
  });
  var el = document.getElementById('zone-lbl');
  if (inZone !== lastZone) {
    lastZone = inZone;
    if (inZone) { el.textContent = inZone; el.classList.add('show'); }
    else el.classList.remove('show');
  }
}

// ══════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════
function update(dt2) {
  // WASD pan
  var spd = (keys['ShiftLeft']||keys['ShiftRight']) ? 250 : 140;
  if (keys['KeyW']||keys['ArrowUp'])    cam.y += spd*dt2/cam.zoom;
  if (keys['KeyS']||keys['ArrowDown'])  cam.y -= spd*dt2/cam.zoom;
  if (keys['KeyA']||keys['ArrowLeft'])  cam.x += spd*dt2/cam.zoom;
  if (keys['KeyD']||keys['ArrowRight']) cam.x -= spd*dt2/cam.zoom;

  // Clamp camera
  var maxPan = (GARDEN + 80) / cam.zoom;
  cam.x = Math.max(-maxPan, Math.min(maxPan, cam.x));
  cam.y = Math.max(-maxPan, Math.min(maxPan, cam.y));

  // Update pets
  petInsts.forEach(function(p) {
    p.wanderTimer -= dt2;
    if (p.wanderTimer <= 0) {
      p.wanderAngle += (Math.random()-.5)*2;
      p.wanderTimer = 1.5+Math.random()*3.5;
    }
    var spd2 = 25+Math.random()*.5;
    var nx = p.x + Math.cos(p.wanderAngle)*spd2*dt2;
    var ny = p.y + Math.sin(p.wanderAngle)*spd2*dt2;
    var B = GARDEN - 30;
    if (Math.abs(nx) > B) { p.wanderAngle = Math.PI - p.wanderAngle; nx = p.x; }
    if (Math.abs(ny) > B) { p.wanderAngle = -p.wanderAngle; ny = p.y; }
    p.x = nx; p.y = ny;

    // Feed anim decay
    if (p.feedAnim > 0) p.feedAnim = Math.max(0, p.feedAnim - dt2*1.2);
    if (p.playAnim > 0) p.playAnim = Math.max(0, p.playAnim - dt2*1.2);

    // Sparkles
    p.sparkles.forEach(function(sp) {
      sp.x += sp.vx; sp.y += sp.vy;
      sp.vy += 0.05;
      sp.life -= dt2*1.5;
    });
    p.sparkles = p.sparkles.filter(function(sp){return sp.life > 0;});
  });

  checkZone();
}

// ══════════════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════════════
function loop(now) {
  dt = Math.min((now - last)/1000, 0.05);
  t += dt;
  last = now;

  update(dt);

  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawWorld();
  drawMinimap();

  // FPS
  fc++; ft += dt;
  if (ft >= 0.5) {
    document.getElementById('fps').textContent = Math.round(fc/ft)+' fps';
    fc = 0; ft = 0;
  }

  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
initDecorations();
initPets();
init3DPets();

// Intro zoom
var introZoom = 0.4;
cam.zoom = introZoom;
var startTime = performance.now();
function introStep(now) {
  var progress = Math.min((now - startTime) / 1200, 1);
  var ease = 1 - Math.pow(1-progress,3);
  cam.zoom = introZoom + (1.0 - introZoom)*ease;
  if (progress < 1) requestAnimationFrame(introStep);
  else {
    cam.zoom = 1.0;
    last = performance.now();
    requestAnimationFrame(loop);
  }
}
requestAnimationFrame(introStep);

// Welcome toast
setTimeout(function(){showToast('🌿 Welcome to PetVerse Garden — click a pet to interact!');}, 800);
</script>
