<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PetVerse Garden — Sky View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d2010;font-family:'Segoe UI',sans-serif}
canvas{display:block;cursor:grab}
canvas.dragging{cursor:grabbing}

/* Loading */
#loading{position:fixed;inset:0;z-index:100;background:#0a1a0a;display:flex;flex-direction:column;align-items:center;justify-content:center}
.l-icon{font-size:3rem;animation:pb 1.2s ease-in-out infinite}
.l-txt{color:#6ee77a88;margin-top:14px;letter-spacing:.15em;font-size:.8rem;text-transform:uppercase}
.bar-t{width:220px;height:4px;background:rgba(110,231,122,.15);border-radius:4px;margin-top:18px;overflow:hidden}
.bar-f{height:100%;width:0%;background:linear-gradient(90deg,#2d8a45,#6ee77a,#38d9b0);transition:width .35s}
@keyframes pb{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px) scale(1.1)}}
#fallback{position:fixed;inset:0;z-index:120;background:linear-gradient(180deg,#0a1a0a,#102814);display:none;align-items:center;justify-content:center;padding:24px}
#fallback.show{display:flex}
.fb-card{width:min(560px,100%);padding:28px;border-radius:20px;background:rgba(7,20,10,.88);border:1px solid rgba(110,231,122,.25);box-shadow:0 20px 60px rgba(0,0,0,.35);color:#e5f7e7;text-align:center}
.fb-title{font-size:1.4rem;font-weight:800;color:#6ee77a;margin-bottom:10px}
.fb-text{font-size:.95rem;line-height:1.7;color:rgba(229,247,231,.78)}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%);
}
#logo{
  font-size:1.1rem;font-weight:900;letter-spacing:.05em;
  background:linear-gradient(90deg,#6ee77a,#38d9b0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#fps{font-size:.65rem;color:rgba(255,255,255,.2);font-family:monospace}

/* Mode float button */
#mode-float{
  position:fixed;top:14px;right:14px;z-index:9999;pointer-events:all;cursor:pointer;
  background:rgba(0,0,0,.62);border:1.5px solid rgba(110,231,122,.45);
  border-radius:30px;padding:9px 18px;display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(14px);box-shadow:0 4px 20px rgba(0,0,0,.4);transition:all .3s;user-select:none;
}
#mode-float:hover{background:rgba(30,80,30,.7);border-color:rgba(110,231,122,.8);transform:scale(1.04)}
#mode-float .mf-icon{font-size:1.2rem;transition:transform .5s}
#mode-float .mf-label{font-size:.8rem;font-weight:800;color:#6ee77a;letter-spacing:.05em}
#mode-float .mf-key{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.35);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 5px}

/* Pet tooltip */
#pet-tooltip{
  position:fixed;pointer-events:none;z-index:200;
  background:rgba(5,15,5,.88);border:1px solid rgba(110,231,122,.45);
  border-radius:12px;padding:8px 16px;
  backdrop-filter:blur(12px);opacity:0;transition:opacity .25s;
  transform:translate(-50%,-100%);margin-top:-14px;
  white-space:nowrap;
}
#pet-tooltip.show{opacity:1}
#pet-tooltip .pt-name{font-size:.92rem;font-weight:800;color:#6ee77a;margin-bottom:2px}
#pet-tooltip .pt-type{font-size:.72rem;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase}

/* Pet panel */
#pet-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:min(540px,96vw);z-index:200;pointer-events:all;
  background:linear-gradient(160deg,rgba(8,24,8,.95),rgba(12,30,20,.95));
  border:1px solid rgba(110,231,122,.3);border-bottom:none;
  border-radius:22px 22px 0 0;padding:20px 24px 28px;
  backdrop-filter:blur(20px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
#pet-panel.open{transform:translateX(-50%) translateY(0)}
#pet-panel .pp-close{
  position:absolute;top:12px;right:14px;background:none;border:none;
  cursor:pointer;color:rgba(255,255,255,.4);font-size:1.3rem;pointer-events:all;
}
#pet-panel .pp-icon{font-size:2.8rem;margin-bottom:6px;display:block}
#pet-panel .pp-name{font-size:1.4rem;font-weight:900;color:#6ee77a;margin-bottom:2px}
#pet-panel .pp-subtitle{font-size:.78rem;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
#pet-panel .pp-desc{font-size:.85rem;color:rgba(255,255,255,.7);line-height:1.6}
#pet-panel .pp-stats{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
#pet-panel .pp-stat{
  flex:1;min-width:80px;background:rgba(110,231,122,.08);
  border:1px solid rgba(110,231,122,.2);border-radius:10px;
  padding:8px 12px;text-align:center;
}
#pet-panel .pp-stat .sv{font-size:.95rem;font-weight:800;color:#6ee77a}
#pet-panel .pp-stat .sk{font-size:.65rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}

/* Controls bar */
#ctrl-bar{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:6px 16px;display:flex;gap:12px;align-items:center;
  backdrop-filter:blur(10px);
}
.k{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 5px;font-size:.65rem;color:rgba(255,255,255,.7);font-weight:700}
.ct{font-size:.65rem;color:rgba(255,255,255,.45);letter-spacing:.04em}

/* Zone label */
#zone-lbl{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:6px 18px;
  font-size:.8rem;font-weight:700;color:#6ee77a;letter-spacing:.06em;
  opacity:0;transition:opacity .3s;backdrop-filter:blur(10px);
  pointer-events:none;
}
#zone-lbl.show{opacity:1}

/* Mini-map */
#minimap{
  position:absolute;bottom:56px;right:14px;
  width:90px;height:90px;background:rgba(0,0,0,.5);
  border:1px solid rgba(110,231,122,.25);border-radius:10px;
  overflow:hidden;
}
#minimap canvas{width:100%;height:100%}
</style>
</head>
<body>

<div id="loading">
  <div class="l-icon">🌿</div>
  <p class="l-txt">Growing the garden...</p>
  <div class="bar-t"><div class="bar-f" id="bar"></div></div>
</div>

<div id="fallback">
  <div class="fb-card">
    <div class="fb-title">PetVerse could not start here</div>
    <div class="fb-text" id="fallback-text">This embedded browser could not initialize the 3D garden.</div>
  </div>
</div>

<div id="mode-float">
  <span class="mf-icon" id="mf-icon">🌙</span>
  <span class="mf-label" id="mf-label">Night Mode</span>
  <span class="mf-key">T</span>
</div>

<div id="pet-tooltip">
  <div class="pt-name" id="pt-name"></div>
  <div class="pt-type" id="pt-type"></div>
</div>

<div id="pet-panel">
  <button class="pp-close" id="pp-close">*</button>
  <span class="pp-icon" id="pp-icon">🐱</span>
  <div class="pp-name" id="pp-name">Cat</div>
  <div class="pp-subtitle" id="pp-subtitle">Common Pet</div>
  <div class="pp-desc" id="pp-desc">A description</div>
  <div class="pp-stats">
    <div class="pp-stat"><div class="sv" id="pp-s1">—</div><div class="sk">Level</div></div>
    <div class="pp-stat"><div class="sv" id="pp-s2">—</div><div class="sk">Power</div></div>
    <div class="pp-stat"><div class="sv" id="pp-s3">—</div><div class="sk">Speed</div></div>
    <div class="pp-stat"><div class="sv" id="pp-s4">—</div><div class="sk">Charm</div></div>
  </div>
</div>

<div id="hud">
  <div id="topbar">
    <div id="logo">🌿 PetVerse Garden</div>
    <div id="fps"></div>
  </div>
  <div id="zone-lbl" id="zone-lbl"></div>
  <div id="ctrl-bar">
    <span class="ct"><span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> Pan</span>
    <span class="ct"><span class="k">Scroll</span> Zoom</span>
    <span class="ct"><span class="k">Drag</span> Rotate</span>
    <span class="ct"><span class="k">T</span> Day/Night</span>
    <span class="ct"><span class="k">Click Pet</span> Info</span>
  </div>
  <div id="minimap"><canvas id="mm-canvas" width="90" height="90"></canvas></div>
</div>

<script>
function showFallback(message) {
  var loading = document.getElementById('loading');
  if (loading) loading.style.display = 'none';
  var fallback = document.getElementById('fallback');
  var text = document.getElementById('fallback-text');
  if (text && message) text.textContent = message;
  if (fallback) fallback.classList.add('show');
}

if (typeof THREE === 'undefined' || typeof gsap === 'undefined') {
  showFallback('The 3D engine did not load inside this JavaFX view. Open PetVerse in a full browser or bundle the libraries locally.');
  throw new Error('PetVerse dependencies failed to load');
}

// ═══════════════════════════════════════════════════════
// PET DATA
// ═══════════════════════════════════════════════════════
var PET_DATA = {
  cat:     {name:'Cat',     icon:'🐱', rarity:'Common',    col:0xdd8844, accent:0xff9955, desc:'A graceful tabby who loves sunbathing in the garden and chasing butterflies.',   lvl:12, pow:45, spd:72, charm:88},
  dog:     {name:'Dog',     icon:'🐶', rarity:'Common',    col:0xaa6633, accent:0xcc8855, desc:'Loyal and energetic, always ready to fetch sticks and splash in the pond.',       lvl:10, pow:60, spd:68, charm:95},
  dragon:  {name:'Dragon',  icon:'🐉', rarity:'Legendary', col:0x228833, accent:0x44cc55, desc:'An ancient winged dragon that soars over the garden, breathing green fire.',      lvl:50, pow:99, spd:85, charm:70},
  fox:     {name:'Fox',     icon:'🦊', rarity:'Rare',      col:0xcc5522, accent:0xff7733, desc:'A cunning forest fox who patrols the garden walls and collects shiny objects.',   lvl:22, pow:55, spd:90, charm:75},
  bird:    {name:'Bird',    icon:'🐦', rarity:'Common',    col:0xddcc22, accent:0xffee44, desc:'A cheerful canary that perches on lamp posts and fills the air with song.',       lvl:8,  pow:20, spd:95, charm:92},
  hamster: {name:'Hamster', icon:'🐹', rarity:'Common',    col:0xddaaaa, accent:0xeecccc, desc:'A fluffy hamster who digs burrows near the bushes and hides tiny treasures.',    lvl:5,  pow:15, spd:40, charm:99},
  panda:   {name:'Panda',   icon:'🐼', rarity:'Rare',      col:0x111111, accent:0xffffff, desc:'A gentle giant panda who eats bamboo by the pond and naps in the sun.',           lvl:18, pow:70, spd:35, charm:97},
  rabbit:  {name:'Rabbit',  icon:'🐰', rarity:'Uncommon',  col:0xddccbb, accent:0xffeedd, desc:'A speedy rabbit that hops between flower patches collecting nectar.',             lvl:14, pow:30, spd:88, charm:94},
};
var RARITY_COLS = {Common:'#6ee77a', Uncommon:'#38d9b0', Rare:'#60a5fa', Legendary:'#f59e0b'};

var ACTIVE_PETS = [];
var PET_META_BY_KEY = {};
var PET_PAYLOAD_PROVIDED = false;
var PET_POSITIONS = [
  {sx:-6, sz:5},{sx:6, sz:-5},{sx:-2, sz:9},{sx:8, sz:2},{sx:3, sz:11},{sx:-8, sz:-2},{sx:7, sz:8},{sx:-3, sz:-8},
  {sx:1, sz:6},{sx:-10, sz:1},{sx:10, sz:-1},{sx:-6, sz:-9},{sx:5, sz:9},{sx:-9, sz:7},{sx:9, sz:-7},{sx:0, sz:-10}
];

function toTitleCase(v) {
  var s = String(v || '');
  return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : '';
}

function parsePetsFromQuery() {
  try {
    var raw = new URLSearchParams(window.location.search).get('pets');
    PET_PAYLOAD_PROVIDED = raw !== null;
    if (!raw) return [];
    var data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) {
    return [];
  }
}

function normalizePetInput(entry, idx) {
  if (!entry || typeof entry !== 'object') return null;
  var type = String(entry.type || '').toLowerCase();
  if (!PET_DATA[type]) return null;
  var rarity = String(entry.rarity || PET_DATA[type].rarity || 'Common');
  var level = parseInt(entry.level || PET_DATA[type].lvl || 1, 10);
  var userId = entry.userId || entry.id || ('guest-' + idx);
  return {
    key: String(userId) + '-' + idx,
    userId: userId,
    type: type,
    name: String(entry.name || PET_DATA[type].name || toTitleCase(type)),
    owner: String(entry.owner || 'Collaborator'),
    rarity: toTitleCase(rarity),
    level: Number.isFinite(level) ? Math.max(1, level) : 1,
    mood: String(entry.mood || 'calm').toLowerCase(),
    sharedProjectsCount: parseInt(entry.sharedProjectsCount || 0, 10) || 0,
    hasSharedProjects: !!entry.hasSharedProjects || !!entry.isSelf,
    isSelf: !!entry.isSelf
  };
}

function rarityTier(rarity) {
  var r = String(rarity || 'Common').toLowerCase();
  if (r === 'legendary') return 4;
  if (r === 'epic') return 3;
  if (r === 'rare') return 2;
  if (r === 'uncommon') return 1;
  return 0;
}

function rarityColorHex(rarity) {
  var label = toTitleCase(rarity || 'Common');
  var css = RARITY_COLS[label] || '#6ee77a';
  return parseInt(css.replace('#', ''), 16);
}

function getDefaultPetList() {
  return Object.keys(PET_DATA).map(function(type, idx) {
    return normalizePetInput({ type: type, name: PET_DATA[type].name, owner: 'System', hasSharedProjects: true }, idx);
  }).filter(Boolean);
}

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.setClearColor(0x0a1a0a);
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1a0a, 35, 75);

// ═══════════════════════════════════════════════════════
// ISOMETRIC / SKY CAMERA
// ═══════════════════════════════════════════════════════
var camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
var camTarget = new THREE.Vector3(0, 0, 0);
var camRadius = 28, camTheta = 0.55, camPhi = Math.PI/2 - 0.92;
// camPhi controls elevation: near PI/2 = top-down
function updateCamera() {
  camera.position.x = camTarget.x + camRadius * Math.sin(camTheta) * Math.cos(camPhi);
  camera.position.y = camTarget.y + camRadius * Math.sin(camPhi);
  camera.position.z = camTarget.z + camRadius * Math.cos(camTheta) * Math.cos(camPhi);
  camera.lookAt(camTarget);
}
updateCamera();

// ── Camera Controls ────────────────────────────────────
var isDragging = false, lastMX = 0, lastMY = 0, isRMB = false;
var panKeys = {};
document.addEventListener('keydown', function(e) {
  panKeys[e.code] = true;
  if (e.code === 'KeyT') toggleMode();
});
document.addEventListener('keyup', function(e) { panKeys[e.code] = false; });

renderer.domElement.addEventListener('mousedown', function(e) {
  isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
  isRMB = (e.button === 2);
  renderer.domElement.classList.add('dragging');
});
renderer.domElement.addEventListener('contextmenu', function(e) { e.preventDefault(); });
window.addEventListener('mouseup', function() {
  isDragging = false;
  renderer.domElement.classList.remove('dragging');
});
window.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  if (isRMB || e.ctrlKey) {
    // Pan
    var right = new THREE.Vector3(Math.cos(camTheta), 0, -Math.sin(camTheta));
    var forward = new THREE.Vector3(-Math.sin(camTheta) * Math.sin(camPhi), 0, -Math.cos(camTheta) * Math.sin(camPhi));
    camTarget.addScaledVector(right, -dx * 0.04);
    camTarget.addScaledVector(forward, -dy * 0.04);
  } else {
    camTheta -= dx * 0.008;
    camPhi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, camPhi - dy * 0.006));
  }
  updateCamera();
  handleHover(e);
});
renderer.domElement.addEventListener('wheel', function(e) {
  camRadius = Math.max(8, Math.min(55, camRadius + e.deltaY * 0.04));
  updateCamera();
  e.preventDefault();
}, {passive:false});

// Touch
var touches = {};
renderer.domElement.addEventListener('touchstart', function(e) {
  Array.from(e.touches).forEach(function(t) { touches[t.identifier] = {x:t.clientX,y:t.clientY}; });
  e.preventDefault();
}, {passive:false});
renderer.domElement.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1) {
    var t = e.touches[0], prev = touches[t.identifier] || {x:t.clientX,y:t.clientY};
    camTheta -= (t.clientX - prev.x) * 0.008;
    camPhi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, camPhi - (t.clientY - prev.y) * 0.006));
    touches[t.identifier] = {x:t.clientX, y:t.clientY};
    updateCamera();
  } else if (e.touches.length === 2) {
    var t0 = e.touches[0], t1 = e.touches[1];
    var dist = Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
    if (touches._pinch) camRadius = Math.max(8, Math.min(55, camRadius + (touches._pinch - dist) * 0.08));
    touches._pinch = dist;
    updateCamera();
  }
  e.preventDefault();
}, {passive:false});
renderer.domElement.addEventListener('touchend', function(e) {
  Array.from(e.changedTouches).forEach(function(t) { delete touches[t.identifier]; });
  touches._pinch = null;
});

// ═══════════════════════════════════════════════════════
// TEXTURES
// ═══════════════════════════════════════════════════════
var TL = new THREE.TextureLoader();

function M(col, rough, metal, em, ei) {
  var m = new THREE.MeshStandardMaterial({color:col, roughness:rough===undefined?.8:rough, metalness:metal||0});
  if (em) { m.emissive = new THREE.Color(em); m.emissiveIntensity = ei||.5; }
  return m;
}
function add(geo, mat, x, y, z, rx, ry, rz, par) {
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x||0, y||0, z||0);
  if (rx) mesh.rotation.x = rx; if (ry) mesh.rotation.y = ry; if (rz) mesh.rotation.z = rz;
  mesh.castShadow = true; mesh.receiveShadow = true;
  (par||scene).add(mesh); return mesh;
}
function Box(w,h,d,mat,x,y,z,rx,ry,rz,par){return add(new THREE.BoxGeometry(w,h,d),mat,x,y,z,rx,ry,rz,par);}
function Cyl(rt,rb,h,s,mat,x,y,z,rx,ry,rz,par){return add(new THREE.CylinderGeometry(rt,rb,h,s),mat,x,y,z,rx,ry,rz,par);}
function Sph(r,mat,x,y,z,par){return add(new THREE.SphereGeometry(r,14,10),mat,x,y,z,0,0,0,par);}
function Cone(r,h,s,mat,x,y,z,ry){return add(new THREE.ConeGeometry(r,h,s),mat,x,y,z,0,ry||0,0);}

function buildCat(col, accent) {
  var g = new THREE.Group();
  // Body
  var body = new THREE.Mesh(new THREE.SphereGeometry(.38,12,8),M(col,.7));
  body.scale.set(1,.9,1.15); body.position.y=.38; g.add(body);
  // Head
  var head = new THREE.Mesh(new THREE.SphereGeometry(.3,12,8),M(col,.7));
  head.position.set(0,.82,.15); g.add(head); g.userData.head=head;
  // Ears
  [-1,1].forEach(function(s){
    var ear=Cone(.1,.22,4,M(col,.7),s*.18,1.04,.18,.1); ear.rotation.z=s*.25; g.add(ear);
    Cone(.06,.16,4,M(accent,.6),s*.18,1.04,.19,.1);
  });
  // Eyes
  [-1,1].forEach(function(s){
    var eye=new THREE.Mesh(new THREE.SphereGeometry(.06,8,6),M(0x22cc44,.1,0,0x22ff44,.8));
    eye.position.set(s*.12,.88,.42); g.add(eye);
    var pupil=new THREE.Mesh(new THREE.SphereGeometry(.04,8,6),M(0x111111));
    pupil.position.set(s*.12,.88,.45); g.add(pupil);
  });
  // Nose
  var nose=new THREE.Mesh(new THREE.SphereGeometry(.035,8,6),M(0xff8899,.3));
  nose.position.set(0,.8,.46); g.add(nose);
  // Tail
  var tailCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0,.28,-.4),new THREE.Vector3(.3,.5,-.55),new THREE.Vector3(.55,.9,-.35),new THREE.Vector3(.45,1.1,-.1)
  ]);
  var tailGeo=new THREE.TubeGeometry(tailCurve,10,.06,.06,false);
  var tail=new THREE.Mesh(tailGeo,M(col,.75)); g.add(tail); g.userData.tail=tail;
  // Legs
  [-.22,.22].forEach(function(sx){
    [-.1,.35].forEach(function(sz){
      var leg=new THREE.Mesh(new THREE.CylinderGeometry(.07,.09,.3,8),M(col,.75));
      leg.position.set(sx,.1,sz); g.add(leg);
    });
  });
  // Shadow circle
  var shadow=new THREE.Mesh(new THREE.CircleGeometry(.42,20),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.22,depthWrite:false}));
  shadow.rotation.x=-Math.PI/2; shadow.position.y=.01; g.add(shadow);
  return g;
}

var PET_BUILD_CONFIG = {
  cat:     {fn:buildCat, speed:.8, amp:.12, fly:false},
  dog:     {fn:buildDog, speed:1.0, amp:.1, fly:false},
  dragon:  {fn:buildDragon, speed:.5, amp:.4, fly:true},
  fox:     {fn:buildFox, speed:.9, amp:.11, fly:false},
  bird:    {fn:buildBird, speed:1.3, amp:.5, fly:true},
  hamster: {fn:buildHamster, speed:.5, amp:.08, fly:false},
  panda:   {fn:buildPanda, speed:.4, amp:.07, fly:false},
  rabbit:  {fn:buildRabbit, speed:1.1, amp:.18, fly:false}
};

function clearSpawnedPets() {
  petMeshes.forEach(function(pet) {
    if (pet.userData.ring) scene.remove(pet.userData.ring);
    if (pet.userData.label) scene.remove(pet.userData.label);
    scene.remove(pet);
  });
  petMeshes.length = 0;
  PET_META_BY_KEY = {};
}

function buildActivePets(list) {
  var normalized = (Array.isArray(list) ? list : []).map(normalizePetInput).filter(Boolean);
  ACTIVE_PETS = normalized.length ? normalized : (PET_PAYLOAD_PROVIDED ? [] : getDefaultPetList());
  if (!PET_PAYLOAD_PROVIDED && !ACTIVE_PETS.some(function(p) { return p.hasSharedProjects; })) {
    ACTIVE_PETS = getDefaultPetList();
  }
}

function spawnPets() {
  clearSpawnedPets();
  ACTIVE_PETS.forEach(function(entry, idx) {
    var cfg = PET_BUILD_CONFIG[entry.type];
    var base = PET_DATA[entry.type];
    if (!cfg || !base) return;

    var pos = PET_POSITIONS[idx % PET_POSITIONS.length];
    var gridShift = Math.floor(idx / PET_POSITIONS.length);
    var sx = pos.sx + ((gridShift % 3) - 1) * 1.2;
    var sz = pos.sz + (Math.floor(gridShift / 3) - 1) * 1.2;

    var pet = cfg.fn(base.col, base.accent);
    pet.position.set(sx, cfg.fly ? 1.8 : 0, sz);
    pet.userData.petId = entry.type;
    pet.userData.petKey = entry.key;
    pet.userData.speed = cfg.speed;
    pet.userData.amp = cfg.amp;
    pet.userData.fly = cfg.fly;
    pet.userData.wanderAngle = Math.random() * Math.PI * 2;
    pet.userData.wanderTimer = Math.random() * 3;
    pet.userData.homeX = sx;
    pet.userData.homeZ = sz;
    var tier = rarityTier(entry.rarity);
    pet.userData.rarityTier = tier;
    scene.add(pet);
    petMeshes.push(pet);

    var ringRadius = 0.42 + (tier * 0.03);
    var ringThickness = 0.04 + (tier * 0.006);
    var ringColor = rarityColorHex(entry.rarity);
    var ring = new THREE.Mesh(
      new THREE.TorusGeometry(ringRadius, ringThickness, 8, 40),
      new THREE.MeshStandardMaterial({
        color:ringColor,
        emissive:ringColor,
        emissiveIntensity:0.58 + (tier * 0.2),
        transparent:true,
        opacity:0.45 + (tier * 0.08)
      })
    );
    ring.rotation.x = Math.PI/2; ring.position.set(sx,.05,sz); scene.add(ring);
    pet.userData.ring = ring;

    var canvas2d = document.createElement('canvas'); canvas2d.width=256; canvas2d.height=64;
    var ctx2d = canvas2d.getContext('2d');
    ctx2d.fillStyle='rgba(0,0,0,0)';ctx2d.fillRect(0,0,256,64);
    ctx2d.fillStyle='rgba(8,24,8,0.82)';
    roundRect(ctx2d,4,8,248,48,12);ctx2d.fill();
    ctx2d.strokeStyle='rgba(110,231,122,0.6)';ctx2d.lineWidth=1.5;
    roundRect(ctx2d,4,8,248,48,12);ctx2d.stroke();
    ctx2d.fillStyle='#6ee77a';ctx2d.font='bold 20px Segoe UI';ctx2d.textAlign='center';
    ctx2d.fillText(base.icon+' '+entry.name,128,36);
    var labelTex=new THREE.CanvasTexture(canvas2d);
    var labelMesh=new THREE.Mesh(new THREE.PlaneGeometry(2.2,.55),new THREE.MeshBasicMaterial({map:labelTex,transparent:true,depthWrite:false,side:THREE.DoubleSide}));
    labelMesh.position.set(sx, cfg.fly ? 3.2 : 2.5, sz);
    scene.add(labelMesh);pet.userData.label=labelMesh;

    PET_META_BY_KEY[entry.key] = {
      key: entry.key,
      type: entry.type,
      name: entry.name,
      owner: entry.owner,
      rarity: entry.rarity || base.rarity,
      level: entry.level || base.lvl,
      mood: entry.mood || 'calm',
      rarityTier: tier,
      stats: { pow: base.pow, spd: base.spd, charm: base.charm }
    };
  });
}

buildActivePets(parsePetsFromQuery());
spawnPets();

function applyIncomingPayload(payload) {
  if (!payload) return;
  var petData = Array.isArray(payload.petData) ? payload.petData : [];
  var community = Array.isArray(payload.community) ? payload.community : [];
  var hasByUser = {};
  community.forEach(function(c) {
    if (!c) return;
    hasByUser[String(c.userId)] = !!c.hasSharedProjects || !!c.isSelf;
  });
  var filtered = petData.filter(function(p) {
    if (!p) return false;
    var key = String(p.userId || p.id || '');
    if (key && Object.prototype.hasOwnProperty.call(hasByUser, key)) {
      return hasByUser[key];
    }
    return !!p.hasSharedProjects || !!p.isSelf;
  });
  if (!filtered.length) return;
  buildActivePets(filtered);
  spawnPets();
}

window.addEventListener('message', function(event) {
  var data = event && event.data;
  if (!data || data.type !== 'METAVERSE_PET_DATA') return;
  applyIncomingPayload(data);
});
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── Pet selection ────────────────────────────────────────
var selectedPet = null;
renderer.domElement.addEventListener('click', function(e) {
  if (isDragging) return;
  mouse2D.x = (e.clientX/innerWidth)*2-1;
  mouse2D.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2D, camera);
  var allPetObjs = [];
  petMeshes.forEach(function(pm) { pm.traverse(function(o){if(o.isMesh)allPetObjs.push(o);}); });
  var hits = raycaster.intersectObjects(allPetObjs, false);
  if (hits.length) {
    var topGroup = hits[0].object;
    while (topGroup.parent && !topGroup.userData.petId) topGroup = topGroup.parent;
    if (topGroup.userData.petKey) openPetPanel(topGroup.userData.petKey);
  } else {
    closePetPanel();
  }
});

function openPetPanel(key) {
  var meta = PET_META_BY_KEY[key];
  if (!meta) return;
  var base = PET_DATA[meta.type];
  selectedPet = key;
  document.getElementById('pp-icon').textContent = base.icon;
  document.getElementById('pp-name').textContent = meta.name;
  document.getElementById('pp-name').style.color = RARITY_COLS[meta.rarity]||'#6ee77a';
  document.getElementById('pp-subtitle').textContent = meta.rarity + ' • ' + meta.owner;
  document.getElementById('pp-subtitle').style.color = (RARITY_COLS[meta.rarity] || '#6ee77a') + '88';
  document.getElementById('pp-desc').textContent = base.desc;
  document.getElementById('pp-s1').textContent = meta.level;
  document.getElementById('pp-s2').textContent = meta.stats.pow;
  document.getElementById('pp-s3').textContent = meta.stats.spd;
  document.getElementById('pp-s4').textContent = meta.stats.charm;
  document.getElementById('pet-panel').classList.add('open');
  // Focus camera on pet
  var pm = petMeshes.find(function(m){return m.userData.petKey===key;});
  if (pm) {
    gsap.to(camTarget,{x:pm.position.x,z:pm.position.z,duration:1.0,ease:'power2.inOut',onUpdate:updateCamera});
    gsap.to({r:camRadius},{r:16,duration:1.0,ease:'power2.inOut',onUpdate:function(){camRadius=this.targets()[0].r;updateCamera();}});
  }
}
function closePetPanel() {
  selectedPet = null;
  document.getElementById('pet-panel').classList.remove('open');
}
document.getElementById('pp-close').addEventListener('click', closePetPanel);
document.getElementById('pet-panel').addEventListener('click', function(e){e.stopPropagation();});

// ── Hover tooltip ───────────────────────────────────────
function handleHover(e) {
  mouse2D.x = (e.clientX/innerWidth)*2-1;
  mouse2D.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2D, camera);
  var allPetObjs = [];
  petMeshes.forEach(function(pm){pm.traverse(function(o){if(o.isMesh)allPetObjs.push(o);});});
  var hits = raycaster.intersectObjects(allPetObjs, false);
  var tooltip = document.getElementById('pet-tooltip');
  if (hits.length) {
    var top = hits[0].object;
    while (top.parent && !top.userData.petId) top = top.parent;
    if (top.userData.petKey && PET_META_BY_KEY[top.userData.petKey]) {
      var meta = PET_META_BY_KEY[top.userData.petKey];
      var d = PET_DATA[meta.type];
      document.getElementById('pt-name').textContent = d.icon+' '+meta.name;
      document.getElementById('pt-name').style.color = RARITY_COLS[meta.rarity]||'#6ee77a';
      document.getElementById('pt-type').textContent = meta.rarity + ' • ' + meta.owner;
      tooltip.style.left = e.clientX+'px'; tooltip.style.top = e.clientY+'px';
      tooltip.classList.add('show');
      renderer.domElement.style.cursor = 'pointer';
      return;
    }
  }
  tooltip.classList.remove('show');
  renderer.domElement.style.cursor = isDragging ? 'grabbing' : 'grab';
}
renderer.domElement.addEventListener('mousemove', handleHover);

function toggleMode() {
  isDark = !isDark;
  document.getElementById('mf-icon').textContent = isDark?'🌙':'☀️';
  document.getElementById('mf-label').textContent = isDark?'Night Mode':'Day Mode';
  document.getElementById('mf-icon').style.transform = isDark?'rotate(0deg)':'rotate(180deg)';
  if (isDark) {
    gsap.to(ambLight.color,{r:.2,g:.3,b:.17,duration:1.5});
    gsap.to(ambLight,{intensity:.55,duration:1.5});
    gsap.to(sunLight,{intensity:0,duration:1.5});
    gsap.to(moonLight,{intensity:.65,duration:1.5});
    gsap.to(gardenAmb,{intensity:0,duration:1.5});
    gsap.to(scene.fog.color,{r:.04,g:.1,b:.04,duration:1.5});
    gsap.to(skyMat.color,{r:.04,g:.1,b:.04,duration:1.5});
    gsap.to(starMat,{opacity:.85,duration:1.5});
    lampLights.forEach(function(l){gsap.to(l,{intensity:1.5,duration:1.5});});

  } else {
    gsap.to(ambLight.color,{r:.85,g:.9,b:.72,duration:1.5});

    gsap.to(sunLight,{intensity:1.6,duration:1.5});
    gsap.to(moonLight,{intensity:.06,duration:1.5});
    gsap.to(gardenAmb,{intensity:.18,duration:1.5});
    gsap.to(scene.fog.color,{r:.7,g:.9,b:.65,duration:1.5});
    gsap.to(skyMat.color,{r:.48,g:.78,b:.52,duration:1.5});
    gsap.to(starMat,{opacity:0,duration:1.0});
    lampLights.forEach(function(l){gsap.to(l,{intensity:.25,duration:1.5});});
    gsap.to(lhLight,{intensity:.7,duration:1.5});
    renderer.setClearColor(0x7ec87a);
  }
}
document.getElementById('mode-float').addEventListener('click', toggleMode);

// ═══════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════
var mmCtx = document.getElementById('mm-canvas').getContext('2d');
function colorToCss(hex) {
  var num = (typeof hex === 'number' ? hex : 0x6ee77a) >>> 0;
  return '#' + num.toString(16).padStart(6, '0');
}
function drawMinimap() {
  mmCtx.clearRect(0,0,90,90);
  mmCtx.fillStyle='rgba(5,20,5,.85)';mmCtx.fillRect(0,0,90,90);
  var S=3; // scale: 1 world unit = S px, offset 45
  function wx(x){return 45+x*S;} function wz(z){return 45+z*S;}
  // Garden boundary
  mmCtx.strokeStyle='rgba(110,231,122,.4)';mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(45-14*S,45-14*S,28*S,28*S);
  // Pond
  mmCtx.fillStyle='rgba(26,104,136,.7)';mmCtx.beginPath();mmCtx.arc(wx(8),wz(6),5*S*.5,0,Math.PI*2);mmCtx.fill();
  // Pets
  petMeshes.forEach(function(pm) {
    var d = PET_DATA[pm.userData.petId];
    mmCtx.fillStyle = colorToCss(d && d.col);
    mmCtx.beginPath();mmCtx.arc(wx(pm.position.x),wz(pm.position.z),2.5,0,Math.PI*2);mmCtx.fill();
  });
  // Camera target
  mmCtx.strokeStyle='rgba(255,255,255,.6)';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.arc(wx(camTarget.x),wz(camTarget.z),3,0,Math.PI*2);mmCtx.stroke();
}

// ═══════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════
var clock = new THREE.Clock(), fc=0, ft=0;
var BOUNDS = 12;

function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), .05), t = clock.getElapsedTime();

  // WASD pan
  if (Object.keys(panKeys).some(function(k){return panKeys[k];})) {
    var spd = panKeys['ShiftLeft']||panKeys['ShiftRight'] ? 16 : 8;
    var right = new THREE.Vector3(Math.cos(camTheta),0,-Math.sin(camTheta));
    var forward = new THREE.Vector3(-Math.sin(camTheta)*Math.sin(camPhi),0,-Math.cos(camTheta)*Math.sin(camPhi)).normalize();
    if (panKeys['KeyW']||panKeys['ArrowUp'])    camTarget.addScaledVector(forward, -spd*dt);
    if (panKeys['KeyS']||panKeys['ArrowDown'])  camTarget.addScaledVector(forward,  spd*dt);
    if (panKeys['KeyA']||panKeys['ArrowLeft'])  camTarget.addScaledVector(right,   -spd*dt);
    if (panKeys['KeyD']||panKeys['ArrowRight']) camTarget.addScaledVector(right,    spd*dt);
    camTarget.x = Math.max(-18,Math.min(18,camTarget.x));
    camTarget.z = Math.max(-18,Math.min(18,camTarget.z));
    updateCamera();
  }

  // Animate pets
  petMeshes.forEach(function(pet, pi) {
    var spd2 = pet.userData.speed, amp2 = pet.userData.amp;

    // Wander AI
    pet.userData.wanderTimer -= dt;
    if (pet.userData.wanderTimer <= 0) {
      pet.userData.wanderAngle += (Math.random()-.5)*1.8;
      pet.userData.wanderTimer = 1.5+Math.random()*3;
    }
    // Move
    var wx2 = Math.cos(pet.userData.wanderAngle)*spd2*dt;
    var wz2 = Math.sin(pet.userData.wanderAngle)*spd2*dt;
    var nx = pet.position.x + wx2, nz = pet.position.z + wz2;
    // Boundary — stay in garden
    if (Math.abs(nx) > BOUNDS) pet.userData.wanderAngle = Math.PI - pet.userData.wanderAngle;
    else if (Math.abs(nz) > BOUNDS) pet.userData.wanderAngle = -pet.userData.wanderAngle;
    else { pet.position.x = nx; pet.position.z = nz; }
    // Face direction of travel
    pet.rotation.y = -(pet.userData.wanderAngle - Math.PI/2);
    // Bob/float animation
    var bobPhase = t * 3.5 * spd2 + pi;
    var baseY = pet.userData.fly ? 1.8 + Math.sin(t*1.2+pi)*.3 : 0;
    pet.position.y = baseY + Math.abs(Math.sin(bobPhase)) * amp2;
    // Head look-around
    if (pet.userData.head) pet.userData.head.rotation.y = Math.sin(t*.9+pi)*0.25;
    // Tail wag
    if (pet.userData.tail) pet.userData.tail.rotation.y = Math.sin(t*4+pi)*0.35;
    // Wing flap (bird/dragon)
    if (pet.userData.wingL) { pet.userData.wingL.rotation.z =  .6+Math.sin(t*6+pi)*.45; pet.userData.wingR.rotation.z = -.6-Math.sin(t*6+pi)*.45; }
    // Glow ring follows pet
    if (pet.userData.ring) {
      var tierBoost = (pet.userData.rarityTier || 0) * 0.18;
      pet.userData.ring.position.x = pet.position.x;
      pet.userData.ring.position.z = pet.position.z;
      pet.userData.ring.material.emissiveIntensity = (0.46 + tierBoost) + Math.sin(t * (2.1 + tierBoost) + pi) * (0.18 + tierBoost * 0.35);
      var pulse = 1 + Math.sin(t * (1.4 + tierBoost * 0.8) + pi) * (0.018 + tierBoost * 0.028);
      pet.userData.ring.scale.set(pulse, pulse, 1);
    }
    // Label follows pet
    if (pet.userData.label) {
      pet.userData.label.position.x = pet.position.x;
      pet.userData.label.position.z = pet.position.z;
      pet.userData.label.position.y = pet.userData.fly ? 3.5 : 2.5;
      pet.userData.label.lookAt(camera.position);
    }
  });

  // Billboard bushes face camera
  scene.traverse(function(o){
    if(o.isMesh&&(o.material===bf1Mat||o.material===bf2Mat)) o.lookAt(camera.position);
  });

  // Water shimmer
  pondMesh.material.emissiveIntensity = .3+Math.sin(t*1.1)*.15;

  // Beacon
  var ba=t*.8,br=22;
  beaconLight.target.position.set(lhx+Math.cos(ba)*br,0,lhz+Math.sin(ba)*br);
  beaconLight.target.updateMatrixWorld();

  // Lamp pulse (night)
  lampLights.forEach(function(l,li){if(isDark)l.intensity=1.3+Math.sin(t*1.5+li)*.2;});
  pL.intensity=1.0+Math.sin(t*.9)*.3;

  // Particle drift
  var pp=pG.attributes.position;
  for(var pi2=0;pi2<N;pi2++){var py=pp.getY(pi2)+.0003;if(py>5)py=.01;pp.setY(pi2,py);}
  pp.needsUpdate=true;
  starMat.size=.22+Math.sin(t*1.5)*.06;

  // Minimap
  drawMinimap();

  // FPS
  fc++;ft+=dt;if(ft>=.5){document.getElementById('fps').textContent=Math.round(fc/ft)+' fps';fc=0;ft=0;}

  renderer.render(scene, camera);
}

// Intro fly-down
gsap.from({r:55,phi:Math.PI/4},{r:28,phi:Math.PI/2-.92,duration:2.5,ease:'power3.out',delay:.4,
  onUpdate:function(){camRadius=this.targets()[0].r;camPhi=this.targets()[0].phi;updateCamera();}
});

window.addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
});

// Loading
function setBar(v){
  document.getElementById('bar').style.width=v+'%';
  if(v>=70){setTimeout(function(){
    var el=document.getElementById('loading');
    gsap.to(el,{opacity:0,duration:.6,onComplete:function(){el.remove();}});
    animate();
  },350);}
}
setBar(15);setTimeout(function(){setBar(45);},200);

window.addEventListener('error', function() {
  showFallback('The 3D garden crashed while rendering in this JavaFX view.');
});
