<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Choose Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0D0A1F 0%, #130B35 50%, #0A1628 100%);
    font-family: "Segoe UI", system-ui, sans-serif;
    color: #F8FAFC;
    min-height: 100vh;
    padding: 18px 16px 24px;
    overflow-x: hidden;
  }
  h2 { text-align:center; font-size:17px; font-weight:700; color:#E2E8F0; margin-bottom:3px; }
  .subtitle { text-align:center; font-size:12px; color:#64748B; margin-bottom:18px; }

  .section { margin-bottom:18px; }
  .section-title {
    font-size:10px; font-weight:700; letter-spacing:1.4px;
    color:#475569; text-transform:uppercase; margin-bottom:8px; padding-left:2px;
  }

  .grid   { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }

  .avatar-card {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 8px 6px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .avatar-card:hover {
    border-color: rgba(139,92,246,0.5);
    background: rgba(139,92,246,0.09);
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(139,92,246,0.22);
  }
  .avatar-card.selected {
    border-color: #8B5CF6;
    background: rgba(139,92,246,0.16);
    box-shadow: 0 0 0 2px rgba(139,92,246,0.45), 0 10px 26px rgba(139,92,246,0.28);
    transform: translateY(-2px);
  }
  .check-badge {
    position:absolute; top:5px; right:5px;
    width:16px; height:16px; border-radius:50%;
    background:linear-gradient(135deg,#8B5CF6,#6D28D9);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(0.4);
    transition:all 0.2s; font-size:9px; color:white; font-weight:700;
  }
  .avatar-card.selected .check-badge { opacity:1; transform:scale(1); }

  /* 3D canvas area */
  .canvas-wrap {
    width:100%; height:110px;
    display:flex; align-items:center; justify-content:center;
    position:relative; border-radius:8px; overflow:hidden;
  }
  .canvas-wrap canvas { display:block; border-radius:6px; }

  /* Emoji fallback circle */
  .emoji-circle {
    width:74px; height:74px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:34px;
  }
  .male-grad   { background:linear-gradient(135deg,#4F46E5,#7C3AED,#A78BFA); }
  .female-grad { background:linear-gradient(135deg,#BE185D,#EC4899,#F9A8D4); }

  /* Spinner inside canvas area */
  .mini-spinner {
    width:24px; height:24px; border-radius:50%;
    border:2px solid rgba(139,92,246,0.2);
    border-top-color:#8B5CF6;
    animation:spin 0.8s linear infinite;
    position:absolute;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .avatar-name {
    font-size:10px; font-weight:600; color:#CBD5E1; text-align:center;
  }
  .gender-pill {
    font-size:9px; font-weight:700; letter-spacing:0.3px;
    padding:1px 7px; border-radius:20px;
  }
  .male-pill   { background:rgba(99,102,241,0.18); color:#A5B4FC; border:1px solid rgba(99,102,241,0.3); }
  .female-pill { background:rgba(236,72,153,0.18); color:#F9A8D4; border:1px solid rgba(236,72,153,0.3); }

  #confirmBtn {
    display:none; width:100%; padding:13px;
    background:linear-gradient(135deg,#8B5CF6,#6D28D9);
    color:white; border:none; border-radius:12px;
    font-size:14px; font-weight:700; cursor:pointer;
    margin-top:6px;
    box-shadow:0 4px 18px rgba(139,92,246,0.4);
    transition:all 0.2s;
  }
  #confirmBtn:hover { background:linear-gradient(135deg,#7C3AED,#5B21B6); transform:translateY(-1px); }
  #confirmBtn.show  { display:block; }
</style>
</head>
<body>

<h2>Choose Your Avatar</h2>
<p class="subtitle">Pick a 3D character that represents you</p>

<div class="section">
  <div class="section-title">Male</div>
  <div class="grid" id="male-grid"></div>
</div>
<div class="section">
  <div class="section-title">Female</div>
  <div class="grid-3" id="female-grid"></div>
</div>

<button id="confirmBtn" onclick="confirmSelection()">✓ &nbsp;Confirm Avatar</button>

<!-- Three.js r146 — non-module global build, loads fine from HTTP context -->
<script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
/* Avatar definitions */
var AVATARS = [
  { key:'male-avatar',  name:'Classic',   gender:'male',   emoji:'👨', ec:'male-grad'   },
  { key:'male-avatar1', name:'Explorer',  gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'male-avatar2', name:'Scholar',   gender:'male',   emoji:'👦', ec:'male-grad'   },
  { key:'male-avatar3', name:'Coder',     gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'male-avatar4', name:'Graduate',  gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'male-avatar5', name:'Scientist', gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'male-avatar6', name:'Creative',  gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'male-avatar7', name:'Medic',     gender:'male',   emoji:'🧑', ec:'male-grad'   },
  { key:'female-avatar',  name:'Classic',   gender:'female', emoji:'👩', ec:'female-grad' },
  { key:'female-avatar2', name:'Tech Lady', gender:'female', emoji:'👩', ec:'female-grad' },
  { key:'female-avatar3', name:'Scholar',   gender:'female', emoji:'👩', ec:'female-grad' }
];

/* Detect if Three.js + WebGL available */
var HAS_THREE = typeof THREE !== 'undefined';
var HAS_WEBGL = (function() {
  try {
    var c = document.createElement('canvas');
    return !!(c.getContext('webgl') || c.getContext('experimental-webgl'));
  } catch(e) { return false; }
})();

var selected = null, selCard = null;

/* Build card DOM */
AVATARS.forEach(function(av) {
  var grid = document.getElementById(av.gender === 'male' ? 'male-grid' : 'female-grid');

  var card = document.createElement('div');
  card.className = 'avatar-card';
  card.id = 'card-' + av.key;
  card.onclick = function() { pick(card, av.key); };

  var badge = document.createElement('div');
  badge.className = 'check-badge';
  badge.textContent = '✓';
  card.appendChild(badge);

  var wrap = document.createElement('div');
  wrap.className = 'canvas-wrap';
  wrap.id = 'wrap-' + av.key;

  if (HAS_THREE && HAS_WEBGL) {
    /* Show spinner while model loads */
    var spin = document.createElement('div');
    spin.className = 'mini-spinner';
    spin.id = 'spin-' + av.key;
    wrap.appendChild(spin);
  } else {
    /* Immediate emoji fallback */
    var circle = document.createElement('div');
    circle.className = 'emoji-circle ' + av.ec;
    circle.textContent = av.emoji;
    wrap.appendChild(circle);
  }

  card.appendChild(wrap);

  var nm = document.createElement('div');
  nm.className = 'avatar-name';
  nm.textContent = av.name;
  card.appendChild(nm);

  var pill = document.createElement('span');
  pill.className = 'gender-pill ' + (av.gender==='male' ? 'male-pill' : 'female-pill');
  pill.textContent = av.gender.toUpperCase();
  card.appendChild(pill);

  grid.appendChild(card);
});

/* Load 3D models when Three.js + WebGL are available */
if (HAS_THREE && HAS_WEBGL) {
  AVATARS.forEach(function(av) { load3D(av); });
}

function load3D(av) {
  var wrap = document.getElementById('wrap-' + av.key);
  var W = wrap.offsetWidth  || 120;
  var H = 110;

  var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.outputEncoding = THREE.sRGBEncoding;

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(42, W / H, 0.01, 100);
  camera.position.set(0, 1.4, 2.8);
  camera.lookAt(0, 0.8, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  var d1 = new THREE.DirectionalLight(0xA78BFA, 1.5);
  d1.position.set(3, 5, 4);
  scene.add(d1);
  var d2 = new THREE.DirectionalLight(0x60A5FA, 0.5);
  d2.position.set(-3, 1, -2);
  scene.add(d2);

  /* GLB served by local HTTP server at /avatars/<key>.glb */
  var glbUrl = '/avatars/' + av.key + '.glb';

  var loader = new THREE.GLTFLoader();
  loader.load(glbUrl,
    function(gltf) {
      /* Remove spinner */
      var sp = document.getElementById('spin-' + av.key);
      if (sp) sp.remove();

      var model = gltf.scene;

      /* Center + scale model to fit */
      var box    = new THREE.Box3().setFromObject(model);
      var center = box.getCenter(new THREE.Vector3());
      var size   = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      model.position.y += size.y * 0.3;
      var scale = 1.5 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);

      scene.add(model);
      wrap.appendChild(renderer.domElement);

      /* Auto-rotate loop */
      var angle = 0;
      (function frame() {
        requestAnimationFrame(frame);
        angle += 0.011;
        model.rotation.y = angle;
        renderer.render(scene, camera);
      })();
    },
    undefined,
    function() {
      /* GLB failed — show emoji fallback */
      var sp = document.getElementById('spin-' + av.key);
      if (sp) sp.remove();
      var circle = document.createElement('div');
      circle.className = 'emoji-circle ' + av.ec;
      circle.textContent = av.emoji;
      wrap.appendChild(circle);
    }
  );
}

function pick(card, key) {
  if (selCard) selCard.classList.remove('selected');
  card.classList.add('selected');
  selCard = card; selected = key;
  document.getElementById('confirmBtn').classList.add('show');
}
function confirmSelection() {
  if (selected) window.alert('avatar:' + selected);
}
</script>
</body>
</html>
